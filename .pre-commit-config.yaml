# `pre-commit install` also installs the pre-push hook (pytest below).
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
        # Auto-generated lockfiles aren't hand-authored YAML; pnpm's format can
        # carry duplicate keys that trip the strict parser (harmless to pnpm).
        exclude: "(^|/)pnpm-lock\\.yaml$"
      - id: check-json
      - id: trailing-whitespace
        exclude: "^venv/"
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        exclude: "^(venv|examples)/"
  - repo: https://github.com/PyCQA/isort
    rev: 6.0.0
    hooks:
      - id: isort
        exclude: "^(venv|examples)/"
        args: ["--profile", "black"]
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: ["--config=.flake8"]
        additional_dependencies:
          [
            pep8-naming,
            flake8_docstrings,
            flake8_comprehensions,
            flake8_bugbear,
            flake8_annotations,
            flake8_simplify,
          ]
        exclude: "^(venv|examples|tests)/"
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        exclude: "^(venv|tests|examples)/"
        pass_filenames: false
        args:
          - --follow-imports=silent
          - --ignore-missing-imports
          - --explicit-package-bases
          - --no-warn-return-any
          - --no-strict-optional
          - --allow-redefinition
          - --show-error-codes
          - jvagent
        additional_dependencies:
          - types-PyYAML
          - types-requests
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        args: [tests/, -q, --tb=short]
        # Full suite runs on push (and via `pre-commit run pytest --hook-stage
        # pre-push` or plain `pytest tests/`) — too slow for every commit.
        stages: [pre-push, manual]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect Secrets
        args: ["scan", "."]
        files: \.(py|txt|yaml|json)$
        # pnpm-lock.yaml (and similar) embed sha512 integrity strings that trip Base64HighEntropyString.
        exclude: "^(venv|.mypy_cache|.test_dbs|tests|examples)/|(^|/)pnpm-lock\\.yaml$"
