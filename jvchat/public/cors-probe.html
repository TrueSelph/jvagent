<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>jvchat CORS Probe</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; }
      button { padding: 8px 14px; margin-right: 8px; }
      pre { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow: auto; }
      .ok { color: green; font-weight: 600; }
      .err { color: #c00; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>jvchat CORS Probe</h1>
    <p>Origin: <code id="origin"></code></p>
    <p>Target base: <code id="target"></code></p>

    <div>
      <button id="btn-health">Test GET /health (public)</button>
      <button id="btn-options-login">Test OPTIONS /api/auth/login</button>
      <button id="btn-post-login">Test POST /api/auth/login</button>
      <button id="btn-get-status">Test GET /api/status</button>
    </div>

    <h3>Log</h3>
    <pre id="log"></pre>

    <script>
      const originEl = document.getElementById('origin')
      const targetEl = document.getElementById('target')
      const logEl = document.getElementById('log')

      const base = (new URL(window.location.href)).origin.replace(/5173$/, '8000')
      originEl.textContent = window.location.origin
      targetEl.textContent = base

      function log(msg, isErr = false) {
        const ts = new Date().toISOString().substr(11, 8)
        logEl.textContent += `${ts} ${isErr ? 'ERR' : 'OK '} ${msg}\n`
      }

      async function probe(path, init) {
        const url = `${base}${path}`
        try {
          const res = await fetch(url, { mode: 'cors', credentials: 'include', ...init })
          const headers = {}
          res.headers.forEach((v, k) => { headers[k] = v })
          log(`${init?.method || 'GET'} ${path} status=${res.status} allow-origin=${headers['access-control-allow-origin'] || 'n/a'}`)
          return { res, headers, body: await res.text() }
        } catch (err) {
          log(`${init?.method || 'GET'} ${path} failed: ${err}`, true)
          return null
        }
      }

      document.getElementById('btn-health').onclick = async () => {
        const r = await probe('/health')
        if (r) log(`health body=${r.body.substring(0,120)}`)
      }

      document.getElementById('btn-options-login').onclick = async () => {
        await probe('/auth/login', { method: 'OPTIONS', headers: { 'Access-Control-Request-Method': 'POST', 'Access-Control-Request-Headers': 'content-type' } })
      }

      document.getElementById('btn-post-login').onclick = async () => {
        const r = await probe('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'admin@jvagent.example', password: 'admin123' }),
        })
        if (r) log(`login body=${r.body.substring(0,120)}`)
      }

      document.getElementById('btn-get-status').onclick = async () => {
        const r = await probe('/api/status')
        if (r) log(`status body=${r.body.substring(0,120)}`)
      }
    </script>
  </body>
</html>
