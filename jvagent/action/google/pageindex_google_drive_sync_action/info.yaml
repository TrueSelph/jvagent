# Page Index Google Drive Sync Action Package Descriptor
# Syncs and ingests documents from Google Drive folders into PageIndex for RAG.

package:
  name: jvagent/pageindex_google_drive_sync_action
  author: jvagent
  archetype: PageIndexGoogleDriveSyncAction
  version: 0.0.1
  meta:
    title: Page Index Google Drive Sync Action
    description: |
      Automatically sync and ingest documents from Google Drive folders into PageIndex.
      Monitors folders for changes (added, modified, removed) and updates the document index accordingly.
      Enables vectorless RAG by indexing documents for semantic search and retrieval.
    group: jvagent
    type: action
  config:
    singleton: false
  dependencies:
    jvagent: ~0.0.1
    actions:
      [
        "jvagent/google_drive_action",
        "jvagent/pageindex_action",
        "jvagent/pageindex_retrieval_interact_action",
      ]
    pip:
      - google-api-python-client>=2.192.0
      - google-auth-httplib2>=0.3.0
      - google-auth-oauthlib>=1.3.0
      - httpx>=0.28.0
