# ReplyAction Package Descriptor (ADR-0014)
package:
  name: jvagent/reply
  author: jvagent
  archetype: ReplyAction
  version: 0.0.1
  meta:
    title: Reply Action
    description: >-
      Orchestrator-native single egress: reply (thin publish), respond (render
      text in the agent's identity), and publish. Identity lives on the Agent
      node (alias + role). Optional shaping applied only when a caller passes it.
    group: jvagent
    type: action
  config:
    singleton: true
  dependencies:
    jvagent: ~0.0.1
    actions: []
