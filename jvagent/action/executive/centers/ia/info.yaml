# IACenter Action Package Descriptor (ADR-0010)
package:
  name: jvagent/ia_center
  author: jvagent
  archetype: IACenter
  version: 0.1.0
  meta:
    title: IACenter
    description: >-
      Anchored rails-IA authority for the Executive pattern — the single home
      that runs hardened InteractAction pathways (resolves the target IA,
      AC-gates it, runs it, reports turn-lock as sustained activation).
    group: jvagent
    type: action
  config:
    singleton: true
  manifest:
    purpose: "Run anchored, hardened rails interact-action pathways."
    latency_class: quick
    routable_by_anchor: false
    pattern_orchestrator: false
  dependencies:
    jvagent: ~0.0.1
    actions: []
