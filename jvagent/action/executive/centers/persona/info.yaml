# PersonaCenter Action Package Descriptor (ADR-0010)
package:
  name: jvagent/persona_center
  author: jvagent
  archetype: PersonaCenter
  version: 0.1.0
  meta:
    title: PersonaCenter
    description: >-
      Language/identity center for the Executive pattern — the sole egress that
      voices all user-facing prose (wraps PersonaAction; verbatim bypass for
      skill-final text). Invoked by the Executive's egress, not anchor-routed.
    group: jvagent
    type: action
  config:
    singleton: true
  manifest:
    purpose: "Voice all final user-facing prose in the agent's identity."
    latency_class: quick
    routable_by_anchor: false
    pattern_orchestrator: false
  dependencies:
    jvagent: ~0.0.1
    actions: []
