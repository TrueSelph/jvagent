# SkillsCenter Action Package Descriptor (ADR-0010)
package:
  name: jvagent/skills_center
  author: jvagent
  archetype: SkillsCenter
  version: 0.1.0
  meta:
    title: SkillsCenter
    description: >-
      Skill-based reasoning center for the Executive pattern — completes tasks
      via a bounded think-act-observe loop (one model call per tick) over a
      pluggable tool surface. Recruited by the Executive, not anchor-routed.
    group: jvagent
    type: action
  config:
    singleton: true
  manifest:
    purpose: "Deliberate, tool-using reasoning to complete a task."
    latency_class: deliberate
    routable_by_anchor: false
    pattern_orchestrator: false
  dependencies:
    jvagent: ~0.0.1
    actions: []
