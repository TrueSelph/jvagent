# Executive Action Package Descriptor (ADR-0010)
package:
  name: jvagent/executive
  author: jvagent
  archetype: ExecutiveInteractAction
  version: 0.1.0
  meta:
    title: ExecutiveInteractAction
    description: >-
      Central-executive orchestrator. Engages light conversation, activates
      specialist centers (skills, IA), integrates results in working memory,
      and voices through the Persona center. Frame-stack control loop at
      weight -200 — no peer shifts, no walker-revisit.
    group: jvagent
    type: interact_action
  config:
    order:
      weight: -200
    singleton: true
  # Pattern-agnostic manifest (ADR-0007 / ADR-0009 / ADR-0010). Executive is a
  # pattern orchestrator: walker-weight-routed, excluded from anchor-routing and
  # IA-dispatch surfaces. Mutually exclusive with Bridge/Cockpit (shared -200).
  manifest:
    purpose: >-
      Central executive. Recruits specialist centers, integrates their
      results, and responds through the sole Persona egress. Runs by walker
      weight, never by anchor.
    latency_class: instant
    turn_lock: false
    routable_by_anchor: false
    pattern_orchestrator: true
  dependencies:
    jvagent: ~0.0.1
    actions: []
