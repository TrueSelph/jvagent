# RetrievalInteractAction Package Descriptor
# This file defines the action's package metadata, dependencies, and configuration

package:
  # Action name in namespace/action_name format
  name: jvagent/retrieval_interact_action

  # Package author
  author: jvagent

  # Archetype: The main Action class name (same as the Action Node class)
  archetype: RetrievalInteractAction

  # Package version
  version: 0.0.1

  # Package metadata
  meta:
    title: RetrievalInteractAction
    description: InteractAction that retrieves context from vector stores and adds directives for PersonaAction
    group: jvagent
    type: interact_action

  # Package configuration
  config:
    order:
      weight: -75

  # Package dependencies
  dependencies:
    # jvagent version requirement
    jvagent: ~0.0.1
    # Other action dependencies (by namespace/action_name)
    actions: []
