# This file defines the action's package metadata, dependencies, and configuration

package:
  name: jvagent/interview_interact_action

  # Package author
  author: jvagent

  # Archetype: The main Action class name (same as the Action Node class)
  archetype: InterviewInteractAction

  # Package version
  version: 1.0.0

  # Package metadata
  meta:
    title: Interview Interact Action
    description: A interact action for interviewing the user
    group: jvagent
    type: interact_action

  # Pattern-agnostic manifest (ADR-0010). Consumed
  # by pattern orchestrators and schedulers for routing hints; ignored by patterns that
  # don't read it. ``turn_lock: true`` because an interview spans multiple
  # turns and other orchestrated units should not interleave.
  manifest:
    purpose: >-
      Conduct a structured multi-turn interview with the user across a
      defined question set, tracking branching and completion state.
    activates_on:
      - "user agrees to give feedback / be interviewed"
      - "operator schedules an interview"
    terminates_when:
      - "all questions answered"
      - "user explicitly cancels (stop / cancel / quit)"
      - "interview times out"
    latency_class: deliberate
    turn_lock: true
    can_interrupt: false
    interrupt_phrases:
      - "stop"
      - "cancel"
      - "quit"
      - "end interview"
    expected_duration_seconds: 180.0

  # Package dependencies
  dependencies:
    # jvagent version requirement
    jvagent: ~0.0.1
    # Other action dependencies (by namespace/action_name)
    actions:
      # - jvagent/another_action: ~1.0.0
