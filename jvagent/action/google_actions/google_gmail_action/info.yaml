# Google Gmail Action Package Descriptor
# Exposes Google Gmail operations via Gmail API with service account.

package:
  name: jvagent/google_gmail_action
  author: jvagent
  archetype: GoogleGmailAction
  version: 0.0.1
  meta:
    title: Google Gmail Action
    description: |
      Send, list, and read emails using the Google Gmail API.
    group: jvagent
    type: action
  config:
    singleton: false
  dependencies:
    jvagent: ~0.0.1
    actions: []
    pip:
      - google-api-python-client>=2.192.0
      - google-auth-httplib2>=0.2.0
      - google-auth-oauthlib>=1.2.0
