package:
  name: jvagent/interview_action
  author: jvagent
  archetype: InterviewAction
  version: 1.0.0
  meta:
    title: Interview Action
    description: >-
      LLM-driven interview tool bundle (interview__* tools). Base SOP at
      SKILL.md. Reference templates in examples/ (not discovered). Live skills
      belong in the agent app overlay. Each skill declares
      extends: action:jvagent/interview_action, requires-actions, and
      interview: frontmatter.
    group: jvagent
    type: action
  config:
    order:
      weight: 0
  dependencies:
    jvagent: ~0.0.1
    actions: []
    pip:
      - pyyaml
