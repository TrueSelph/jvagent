# Bridge Action Package Descriptor
package:
  name: jvagent/bridge
  author: jvagent
  archetype: BridgeInteractAction
  version: 0.1.0
  meta:
    title: BridgeInteractAction
    description: >-
      Multi-helm orchestrator InteractAction. Composes one or more helms
      (Reflex / Reasoning / Specialist) into a single agent slot at
      weight -200, with explicit shift verbs, shift budget, first-emit
      timeout safety net, and AccessControl gating per shift target.
    group: jvagent
    type: interact_action
  config:
    order:
      weight: -200
    singleton: true
  # Pattern-agnostic manifest (ADR-0007 / ADR-0009). Bridge is the canonical
  # pattern orchestrator — it MUST NOT be reached via anchor-routing, IA
  # dispatch tooling, or peer-awareness DELEGATE. pattern_orchestrator: true
  # marks it as walker-weight-routed and excludes it from any IA-dispatch
  # surface.
  manifest:
    purpose: >-
      Multi-helm orchestrator. Composes Reflex + Reasoning (+ specialist
      helms) into a per-turn shift loop with budget, AC gating, and
      observability. Runs by walker weight, never by anchor.
    latency_class: instant
    turn_lock: false
    routable_by_anchor: false
    pattern_orchestrator: true
  dependencies:
    jvagent: ~0.0.1
    actions: []
