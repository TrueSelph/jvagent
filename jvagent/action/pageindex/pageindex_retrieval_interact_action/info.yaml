# PageIndexRetrievalInteractAction — interact wiring for PageIndex RAG.

package:
  name: jvagent/pageindex_retrieval_interact_action
  author: jvagent
  archetype: PageIndexRetrievalInteractAction
  version: 0.0.1
  meta:
    title: PageIndexRetrievalInteractAction
    description: Vectorless RAG interact — delegates search to PageIndexAction
    group: jvagent
    type: interact_action
  config:
    order:
      weight: -75
    limit: 10
    strategy: tree_search
    include_references: true
  dependencies:
    jvagent: ~0.0.1
    actions:
      - "jvagent/pageindex_action"
    pip:
      - "litellm>=1.82.0"
      - "openai>=1.0.0"
      - "PyPDF2>=3.0.1"
      - "pymupdf>=1.26.0"
      - "python-dotenv>=1.1.0"
      - "pyyaml>=6.0"
      - "tiktoken>=0.11.0"
