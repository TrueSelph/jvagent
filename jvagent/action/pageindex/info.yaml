# PageIndexRetrievalInteractAction Package Descriptor

package:
  name: jvagent/pageindex_retrieval_interact_action
  author: jvagent
  archetype: PageIndexRetrievalInteractAction
  version: 0.0.1
  meta:
    title: PageIndexRetrievalInteractAction
    description: Vectorless RAG - retrieves context from PageIndex graph via LLM tree search (no VectorStore)
    group: jvagent
    type: interact_action
  config:
    order:
      weight: -75
    # collection: null  # Optional override; default = agent_id
    # metadata_filter: {}  # Optional key-value filter to narrow search
    node_summary: true
    node_text: true
    doc_description: false
    max_token_num_each_node: 20000
    summary_token_threshold: 200
    limit: 10
    strategy: tree_search
    include_references: true  # Render numbered source references (page numbers, URLs) in directive; set false to save tokens
    # retrieval_excerpt_source: summary  # summary (default) or text — tree prompt + directive excerpts
    # max_summary_chars: 300  # Max chars per node summary in tree prompt (retrieval display)
    # max_tree_prompt_tokens: 16000  # Max tokens for tree; over budget triggers direct search fallback
  dependencies:
    jvagent: ~0.0.1
    actions: []
    pip:
      - "litellm>=1.82.0"
      - "openai>=1.0.0"
      - "PyPDF2>=3.0.1"
      - "pymupdf>=1.26.0"
      - "python-dotenv>=1.1.0"
      - "pyyaml>=6.0"
      - "tiktoken>=0.11.0"
      # Docling PDF/Office → Markdown (assimilate convert_to_markdown, Drive sync, etc.)
      - "docling>=2.0.0"
      - "tabulate>=0.9.0"
