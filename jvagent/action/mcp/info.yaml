# MCP Action Package Descriptor
# Gateway action that fulfills natural language commands via an MCP server.

package:
  name: jvagent/mcp
  author: jvagent
  archetype: MCPAction
  version: 0.0.1
  meta:
    title: MCP Action
    description: Gateway action that manages one or more named MCP servers and exposes fulfill(natural_language_command) for use by other actions (e.g. InteractActions).
    group: jvagent
    type: action
  config:
    singleton: true  # One MCPAction can host multiple MCP servers.
  dependencies:
    jvagent: ~0.0.1
    actions: []
    pip:
      - "mcp>=1.0,<2"
