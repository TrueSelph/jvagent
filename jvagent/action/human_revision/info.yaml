package:
  name: jvagent/human_revision_action
  author: V75 Inc.
  archetype: HumanRevisionAction
  version: 1.0.0
  meta:
    title: Human Revision Action
    description: >
      Generic Human-in-the-Loop (HITL) approval gate. Sends any payload
      (script, post, document) to a designated WhatsApp number for review and
      interprets the reply as approved, revision (with optional instructions),
      or rejected before invoking a callback on the originating action.
    group: jvagent
    type: action
  config:
    order:
      weight: 0
  dependencies:
    jvagent: ~0.0.1
