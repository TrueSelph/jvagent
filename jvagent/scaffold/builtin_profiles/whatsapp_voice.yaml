extends: minimal
actions:
  - action: jvagent/whatsapp_action
    context:
      enabled: true
      description: WhatsApp integration (configure provider and credentials in .env)
      provider: wwebjs



  - action: jvagent/deepgram_stt
    context:
      enabled: true
      description: Deepgram speech-to-text (DEEPGRAM_API_KEY in .env)

  - action: jvagent/elevenlabs_tts
    context:
      enabled: true
      description: ElevenLabs text-to-speech (ELEVENLABS_API_KEY in .env)
