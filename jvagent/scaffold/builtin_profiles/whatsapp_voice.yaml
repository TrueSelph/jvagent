extends: minimal
actions:
  - action: jvagent/whatsapp_action
    context:
      enabled: true
      description: WhatsApp integration (configure provider and credentials in .env)
      provider: wwebjs
      api_url: ${WHATSAPP_API_URL}
      api_key: ${WHATSAPP_API_KEY}
      session: ${WHATSAPP_SESSION}
      base_url: ${APP_BASE_URL}

  - action: jvagent/deepgram_stt
    context:
      enabled: true
      description: Deepgram speech-to-text
      api_key: ${DEEPGRAM_API_KEY}

  - action: jvagent/elevenlabs_tts
    context:
      enabled: true
      description: ElevenLabs text-to-speech
      api_key: ${ELEVENLABS_API_KEY}
