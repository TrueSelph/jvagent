# Bridge profile (BRIDGE-ROADMAP §K).
#
# Multi-helm composition: BridgeInteractAction at weight -200 orchestrates
# ReflexHelm (sub-500ms classifier) and ReasoningHelm (think-act-observe
# loop). Persona stylisation is handled directly by Bridge via
# ``deliver_via_persona`` on engine-final EMITs — no dedicated
# PersonaHelm in the chain (the original dedicated helm was scrapped
# in May 2026 cleanup; see BRIDGE-ROADMAP §G).
#
# This profile is a STARTER for new agents. It is never injected into
# existing agents — the bootstrap layer treats agents declaratively from
# their own agent.yaml.
#
# Use --profile bridge to scaffold a new agent on this composition.
# Use --profile cockpit for the standalone cockpit pattern (the current
# scaffolder default).
actions:
  - action: jvagent/bridge
    context:
      enabled: true
      # Helm composition. Order doesn't matter for resolution; the helm
      # named in ``default_helm`` is the entry point each turn.
      helms:
        - ReflexHelm
        - ReasoningHelm
      default_helm: ReflexHelm
      # Bridge safeguards. ``first_emit_timeout_ms`` is the deadline
      # for Bridge's safety-net ack — 2500ms is the recommended default
      # because ReflexHelm emits a context-aware ``transient_ack`` on
      # most SHIFTs anyway. Lower this if your reasoning model is fast
      # and you want a stricter "always show something within Nms"
      # contract.
      shift_budget_per_turn: 4
      first_emit_timeout_ms: 2500
      safety_net_ack_text: "Still working on this…"
      denied_response_text: "Sorry, I can't do that here."

  - action: jvagent/reflex_helm
    context:
      enabled: true
      # Fast classifier defaults — OpenAI gpt-4o-mini for ubiquity.
      # Swap to Groq llama-3.1-8b-instant or Cerebras to tighten p50
      # below 200ms (see .planning/PATTERNS.md performance ledger).
      model: gpt-4o-mini
      model_action_type: OpenAILanguageModelAction
      model_temperature: 0.0
      model_max_tokens: 256
      timeout_seconds: 3.0
      history_limit: 4
      default_shift_target: ReasoningHelm
      can_emit_directly: true

  - action: jvagent/reasoning_helm
    context:
      enabled: true
      # ReasoningHelm in Bridge mode is the deliberate think/act/observe
      # loop only — the Phase-2 distillation (May 2026) stripped the
      # standalone-Cockpit surfaces. The following Cockpit-era keys are
      # NO LONGER accepted by ReasoningHelm and would be silently
      # ignored (or, with Wave-3 YAML validation, warn at startup) so
      # they are deliberately omitted from this profile:
      #   enable_canned_response          → Reflex owns transient_ack
      #   canned_response_max_words       → ditto
      #   skip_canned_for_intents         → ditto
      #   converse_enabled                → no conversational fast-path
      #   converse_context_limit          → ditto
      #   converse_persona_prompt         → ditto
      #   conversational_fast_path        → ditto
      #   enable_router_preclassifier     → Reflex catches smalltalk upstream
      router_model: gpt-4o-mini
      router_model_action_type: OpenAILanguageModelAction
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      max_iterations: 25
      tool_tier: standard
      response_mode: respond
      skills_source: both
      # Identical-utterance routing cache: short TTL; safe to keep on.
      enable_interact_router_cache: true
      # Engine thought-stream + tool-progress visibility — useful for
      # long-running multi-tool turns so the user sees activity rather
      # than dead air. Reflex still owns the user-facing lead-in.
      stream_internal_progress: true

  - action: jvagent/openai_lm
    context:
      enabled: true
      description: OpenAI language model (OPENAI_API_KEY in .env)
      api_endpoint: https://api.openai.com/v1
      model: gpt-4o-mini
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  - action: jvagent/persona
    context:
      enabled: true
      description: Agent persona — shapes final responses with directives from helms and other actions
      persona_name: __JVAGENT_SCAFFOLD_AGENT_TITLE__
      persona_description: __JVAGENT_SCAFFOLD_AGENT_DESCRIPTION__
      persona_capabilities:
        - Answer user questions helpfully and concisely
        - Search and synthesize information using available tools
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      model_temperature: 0.1
      model_max_tokens: 8192

  - action: jvagent/intro_interact_action
    context:
      enabled: true
      description: First-time-user intro (always_execute) — adds a persona directive on first interaction

  - action: jvagent/handoff_interact_action
    context:
      enabled: true
      description: Hands off to a human — routed by the reasoning helm when the user asks for support
      mode: direct_contact
