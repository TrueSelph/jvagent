extends: conversational
actions:
  - action: jvagent/serper_web_search
    context:
      enabled: true
      description: Web search via Serper
      api_key: ${SERPER_API_KEY}

  - action: jvagent/web_search_retrieval_interact_action
    context:
      enabled: true
      description: Injects web search results for the persona
      weight: -75
      web_search_action_type: SerperWebSearchAction
      anchors:
        - User asks a question that needs current web information
        - User wants research or fact-checking from the internet
    config:
      top_k: 5
