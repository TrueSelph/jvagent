# jvagent Application Descriptor
# This file defines the application metadata, configuration defaults, and lists agents.
# Agents listed in the 'agents' section are automatically installed when you run jvagent or bootstrap.
# 
# In production, this package will be used to bootstrap a running jvagent instance.
# Runtime-specific settings (paths, secrets) should be configured via .env or environment variables.

# Application reference
app: jvagent_demo_app

# Application metadata
version: 1.0.0
author: Your Name/Organization

# jvagent version requirement (optional)
jvagent: ~0.0.1

# Application context: Properties that configure the App node
context:
  name: jvagent Demo App
  description: A demo application showcasing jvagent capabilities
  file_storage_provider: local
  file_storage_root_dir: ./.files
  file_storage_enabled: true

# Application metadata (not stored in App node)
license: MIT
homepage: https://github.com/your-org/jvagent_demo_app
tags:
  - demo
  - example
  - boilerplate

# Application configuration defaults
# These are application-level defaults that can be overridden by .env or environment variables
# In production, the running jvagent instance will use its own paths and settings
# Environment variable placeholders (e.g., ${VAR_NAME}) are automatically resolved
config:
  # Server configuration
  server:
    title: jvagent Demo App API
    description: API for jvagent Demo App
    version: 0.0.1
    host: 0.0.0.0
    port: 8000
  
  # Database configuration (defaults - production will override)
  database:
    type: json
    path: ./jvagent_db
    # MongoDB configuration (uncomment to use MongoDB instead of JSON)
    # type: mongodb
    # uri: mongodb://localhost:27017
    # name: jvagent_db  # Optional: specify database name (defaults to "jvdb" if not set via JVSPATIAL_MONGODB_DB_NAME)
    # Note: MongoDB database names cannot contain dots (.) - use underscores instead
    # DynamoDB configuration (uncomment to use DynamoDB instead of JSON)
    # Ideal for AWS Lambda serverless deployments and production AWS environments
    # type: dynamodb
    # table_name: jvspatial  # Base table name (default: "jvspatial")
    # region: us-east-1  # AWS region name (default: "us-east-1")
    # endpoint_url: http://localhost:8000  # Optional: for local DynamoDB testing (DynamoDB Local)
    # access_key_id: ${AWS_ACCESS_KEY_ID}  # Optional: AWS access key (uses IAM role if not set)
    # secret_access_key: ${AWS_SECRET_ACCESS_KEY}  # Optional: AWS secret key (uses IAM role if not set)
    # Note: For local development, use DynamoDB Local with endpoint_url set to "http://localhost:8000"
    # Note: In AWS Lambda, IAM role credentials are automatically used if access_key_id is not set
    # Note: You can use environment variable placeholders (e.g., ${AWS_ACCESS_KEY_ID}) for sensitive values
  
  # File storage configuration (defaults - production will override)
  file_storage:
    provider: local
    root_dir: ./.files
    enabled: true
  
  # Authentication configuration (defaults - production MUST override secrets)
  auth:
    enabled: true
    jwt_expire_minutes: 60
    # JWT secret should be set via JVSPATIAL_JWT_SECRET environment variable
  
  # Admin user configuration (defaults - production MUST override password)
  admin:
    username: admin
    email: admin@jvagent.example
    # Password should be set via JVAGENT_ADMIN_PASSWORD environment variable
  
  # Interact endpoint configuration
  interact:
    rate_limit_per_minute: 60  # per IP+agent_id combination
    max_utterance_length: 2000  # maximum characters for utterance input (set to null to disable)
  
  # Logging system configuration
  logging:
    enabled: true
    levels: INTERACTION,ERROR,CRITICAL  # Comma-separated log levels to capture
    retention_days: 60  # Log retention period in days (0 = indefinite)
    # Logging database configuration
    # If not specified, logging database defaults to same as main database
    database:
      # type: mongodb  # Defaults to same as database.type if not set (uncomment for MongoDB)
      # uri: mongodb://localhost:27017  # Defaults to same as database.uri if not set (uncomment for MongoDB)
      name: jvagent_logs  # Defaults to jvagent_logs if not set via JVAGENT_LOG_DB_NAME
      path: ./jvagent_logs  # For JSON/SQLite logging databases
      # DynamoDB logging database (uncomment to use DynamoDB for logging)
      # type: dynamodb  # Defaults to same as database.type if not set (uncomment for DynamoDB)
      # table_name: jvagent_logs  # Table name for logging (default: "jvagent_logs")
      # region: us-east-1  # AWS region name (defaults to main database region if not set)
      # endpoint_url: http://localhost:8000  # Optional: for local DynamoDB testing
      # access_key_id: ${AWS_ACCESS_KEY_ID}  # Optional: AWS access key (uses IAM role if not set)
      # secret_access_key: ${AWS_SECRET_ACCESS_KEY}  # Optional: AWS secret key (uses IAM role if not set)
      # Note: If not specified, logging database uses same configuration as main database
      # Note: You can use environment variable placeholders (e.g., ${AWS_ACCESS_KEY_ID}) for sensitive values
  
  # CORS configuration
  cors:
    enabled: true
    origins: http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:5173,http://localhost:5173
  
  # Development settings
  development:
    debug: false
    environment: development  # development or production
  
  # API configuration
  api:
    prefix: /api
    graph_endpoint_enabled: true
  
  # Paths configuration
  paths:
    agents: ./agents

# Agents
# List of agents (automatically installed when you run jvagent or bootstrap)
# Agents are referenced using the format: namespace/agent_name
# Agents are discovered from the agents/ folder structure: agents/{namespace}/{agent_name}/
# Note: Agents can only be installed via this list in app.yaml - there is no direct agent installation
agents:
  # Example agent - will be loaded from agents/jvagent/example_agent/
  - jvagent/example_agent
  
  # Add more agents here - they will be installed automatically when you run jvagent
  # - contrib/another_agent
  # - custom/custom_agent
