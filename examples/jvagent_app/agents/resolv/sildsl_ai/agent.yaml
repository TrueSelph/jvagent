agent: resolv/sildsl_ai
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1
context:
  alias: SILDSL AI
  description: SILDSL AI is the virtual assistant for the Resolv IMS System, delivering updates and stakeholder support for the Strengthening Instructional Leadership at the District and School Levels (SILDSL) “Leadership Project”.
  enabled: true
actions:
  - action: jvagent/interact_router
    context:
      enabled: true
      description: "Intent-based routing action that analyzes utterances and routes to appropriate InteractActions"
      # Model Configuration
      model_action_type: "OpenAILanguageModelAction"
      history_limit: 3
      model: "gpt-4.1-mini"

  - action: jvagent/openai_embedding
    context:
      enabled: true
      description: "OpenAI embeddings API for generating vector embeddings"
      # API Configuration
      api_key: ${OPENAI_API_KEY}
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: text-embedding-3-small
      embedding_dimensions: 1536
      timeout: 30

  # - action: jvagent/intro_interact_action
  #   context:
  #     enabled: true
  #     description: "Introductory interact action for first-time users"

  # # TypesenseVectorStore Action - Vector store for semantic search
  # # Core action from jvagent library (jvagent/action/vectorstore/typesense/)
  # - action: jvagent/typesense_vectorstore
  #   context:
  #     enabled: true
  #     description: "Typesense vector store for semantic search and context retrieval"
  #     # Typesense Configuration
  #     host: localhost
  #     port: 8108
  #     protocol: http
  #     api_key: ${TYPESENSE_API_KEY}  # Set in .env or environment
  #     connection_timeout_seconds: 2
  #     embedding_dimensions: 1536  # Must match embedding model dimensions
  #     # Embedding Model Configuration
  #     embedding_model_action_type: "OpenAIEmbeddingModelAction"  # Entity type to find dynamically

  # # RetrievalInteractAction - Context retrieval from vector stores
  # # Core action from jvagent library (jvagent/action/retrieval/)
  # - action: jvagent/retrieval_interact_action
  #   context:
  #     enabled: true
  #     description: "Retrieves context from vector stores and adds directives for PersonaAction"
  #     # VectorStore Configuration
  #     vectorstore_action_type: "TypesenseVectorStore"  # Entity type to find dynamically
  #     k: 5  # Number of search results to retrieve
  #     weight: -75  # Runs after InteractRouter but before other Interact Actions
  #     # Anchors for routing - published to InteractRouter
  #     # The entity name (RetrievalInteractAction) is automatically used as the key
  #     anchors:
  #       - "User requests information from knowledge base"
  #       - "User asks a question requiring search"
  #       - "User wants to find information"
  #     # Optional: Minimum similarity score threshold (0.0-1.0)
  #     # min_score_threshold: 0.7
  #     # Optional: Customize directive template (default shown for reference)
  #     directive: |
  #       Context retrieved from knowledge base:
  #       {results}
  #       Use this context to inform your response to the user's query.
  #     collection: "n.Agent.478ee040eb98491c8426c975"

  - action: jvagent/openai_lm
    context:
      enabled: true
      description: "OpenAI GPT-4o model action with vision support"
      # API Configuration
      api_key: ${OPENAI_API_KEY}
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: "gpt-4.1-mini"
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  - action: jvagent/persona
    context:
      enabled: true
      description: "Persona action with LLM-driven behavioral parameters"
      # Persona Identity
      persona_name: "SILDSL"
      persona_description: |
        You are the virtual assistant for the Strengthening Instructional Leadership at the District and School Levels (SILDSL) Project, also known as the “Leadership Project”. Your role involves providing informational support and updates on the Leadership Project, which aims to strengthen school and district leadership and improve sector management within Guyana's education system. Keep your responses very short and concise. Do not give any explanation unless asked.
      persona_capabilities:
        - "Provide updates and progress reports on the Leadership Project."
        - "Record and file project-related inquiries or feedback from stakeholders."
        - "Answer questions about project objectives, timelines, and implementation partners."
        - "Share official information from the Ministry of Education and the IDB."
      # Model Configuration
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1-mini"
      model_temperature: 0.1
      model_max_tokens: 8192

  - action: resolv/report_interview_interact_action
    context:
      enabled: true
      description: "Report Interview action is used to create reports."
      weight: -50
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false
  - action: resolv/feedback_interview_interact_action
    context:
      enabled: true
      description: "Feedback Interview action is used to create feedback for incidents and projects."
      weight: -50
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false
  - action: jvagent/converse_interact_action
    context:
      enabled: true
      description: "Fallback action for smalltalk and casual conversation"
      weight: 100 # Runs last as a safety net

  - action: resolv/onboarding_interact_action
    context:
      enabled: true
      description: "Onboarding action is used to register user and subscribe them to default groups."
      weight: -100

  - action: resolv/resolv_api_action
    context:
      enabled: true
      description: "Houses Resolv API credentials and endpoints"
      user_uuid: ${RESOLV_SILDSL_USER_UUID}
      secret_token: ${RESOLV_SILDSL_SECRET_TOKEN}
      api_url: ${RESOLV_SILDSL_API_URL}
      organization_slug: ${RESOLV_SILDSL_ORGANIZATION_SLUG}
      project_id: ${RESOLV_SILDSL_PROJECT_ID}
      agent_identifier: ${RESOLV_SILDSL_AGENT_IDENTIFIER}

  - action: jvagent/access_control_action
    context:
      enabled: false
      description: "Role-based access control with session tracking and permission validation for secure agent operations"
      permissions:
        {
          "default":
            {
              "any":
                { "deny": [], "allow": [{ "group": "all", "enabled": True }] },
            },
          "whatsapp":
            {
              "any":
                {
                  "deny": [{ "user": "all", "enabled": True }],
                  "allow": [{ "user": "5926431530", "enabled": True }],
                },
            },
        }
      session_groups: {}

  - action: jvagent/agent_utils
    context:
      enabled: true
      description: "Agent Utils action for power user controls"

  - action: jvagent/tts_action
    context:
      enabled: true
      description: "Action for Text-to-Speech integration using multiple providers."
      provider: "elevenlabs"
      api_key: ${TTS_API_KEY}
      model: "eleven_turbo_v2"
      voice: "Sarah"

  - action: jvagent/stt_action
    context:
      enabled: true
      description: "Action for Speech-to-Text integration using multiple providers."
      provider: "deepgram"
      api_key: ${STT_API_KEY}
      model: "nova-2"
