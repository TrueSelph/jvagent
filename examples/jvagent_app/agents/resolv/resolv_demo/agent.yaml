# Resolv Demo Agent
#
# Demonstrates the cockpit-driven pattern combined with multi-channel access
# control: jvagent/cockpit replaces the legacy jvagent/interact_router and
# coexists with the resolv interview/onboarding/subscription actions, the
# pageindex retrieval action, the access_control_action, and the WhatsApp
# adapter.
#
# See docs/COCKPIT.md for cockpit architecture.

agent: resolv/resolv_demo
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1

context:
  alias: Resolv Demo Agent
  description: A demo agent for Resolv on the cockpit pattern
  enabled: true
  interaction_limit: 10  # Optional limit on number of interactions (resets after reaching limit)

actions:

  - action: resolv/onboarding_interact_action
    context:
      enabled: true
      description: "Onboarding action is used to register user and subscribe them to default groups."
      weight: -200

  # ── Cockpit (router + agentic loop) ──────────────────────
  - action: jvagent/cockpit
    context:
      enabled: true
      description: >
        Cockpit drives intent routing (Phase 1) and the agentic loop
        (Phase 2). Replaces the legacy interact_router. Resolv interview
        and onboarding actions remain in the chain and are invoked when
        the cockpit defers to them.
      router_model: gpt-4o-mini
      router_model_action_type: OpenAILanguageModelAction
      model_action_type: OllamaLanguageModelAction
      model: deepseek-v4-flash:cloud
      skills: []
      skills_source: both
      max_iterations: 25
      history_limit: 5
      response_mode: respond
      stream_internal_progress: true

  # ── Language Models ──────────────────────────────────────
  - action: jvagent/ollama_lm
    context:
      enabled: true
      description: "Ollama cloud endpoint — primary engine for the cockpit agentic loop"
      api_endpoint: https://ollama.com
      # API key is env-only — set OLLAMA_API_KEY in your environment.
      model: deepseek-v4-flash:cloud
      temperature: 0.2
      max_tokens: 16384
      timeout: 120

  - action: jvagent/openai_lm
    context:
      enabled: true
      description: "OpenAI model — used by router, persona, and resolv interviews"
      # API key is env-only — set OPENAI_API_KEY in your environment.
      api_endpoint: "https://api.openai.com/v1"
      model: "gpt-4.1-mini"
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  # ── PageIndex (RAG) ──────────────────────────────────────
  # Documents must be ingested first via POST /pageindex/documents
  - action: jvagent/pageindex_action
    context:
      enabled: true
      description: "Core PageIndex — ingest and search APIs"
    config:
      limit: 10
      strategy: "tree_search"
      node_summary: true
      node_text: true
      doc_description: false
      max_token_num_each_node: 20000
      summary_token_threshold: 200

  # ── Persona ──────────────────────────────────────────────
  - action: jvagent/persona
    context:
      enabled: true
      description: "Persona action with LLM-driven behavioral parameters"
      persona_name: "RESOLV DEMO AI"
      persona_description: |
        You are a friendly and knowledgeable assistant that helps users
        understand how the resolv framework works. You provide clear,
        concise answers and demonstrate best practices. Keep your responses very short and concise. Do not give any explanation unless asked.
      persona_capabilities:
        - "Submit report for a project"
        - "Submit feedback for an incident or project"
        - "Provide subscription link to opt in and out"
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1-mini"
      model_temperature: 0.1
      model_max_tokens: 8192

  # ── Resolv Interviews ────────────────────────────────────
  - action: resolv/report_interview_interact_action
    context:
      enabled: true
      description: "Report Interview action is used to create reports."
      weight: -50
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false

  - action: resolv/feedback_interview_interact_action
    context:
      enabled: true
      description: "Feedback Interview action is used to create feedback for incidents and projects."
      weight: -50
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false

  - action: resolv/subscription_interact_action
    context:
      enabled: true
      description: "Subscription action is used to present a link to the user to subscribe and unsubscribe from channels and groups."
      weight: -50

  # ── Resolv API credentials ───────────────────────────────
  - action: resolv/resolv_api_action
    context:
      enabled: true
      description: "Houses Resolv API credentials and endpoints"
      user_uuid: ${RESOLV_TEST_USER_UUID}
      secret_token: ${RESOLV_TEST_SECRET_TOKEN}
      api_url: ${RESOLV_TEST_API_URL}
      organization_slug: ${RESOLV_TEST_ORGANIZATION_SLUG}
      project_id: ${RESOLV_TEST_PROJECT_ID}
      # agent_identifier: ${RESOLV_TEST_AGENT_IDENTIFIER}

  # ── Access control + WhatsApp ────────────────────────────
  - action: jvagent/access_control_action
    context:
      enabled: true
      enforce: true
      allow_anonymous: false
      description: "Role-based access control with user_id-based permissions for secure agent operations"
      default_deny: false
      action_aliases:
        report: ReportInterviewInteractAction
      permissions:
        default:
          any:
            deny: []
            allow: [{ group: all, enabled: true }]
          # Report action: deny on default channel (web, etc); allow only via whatsapp
          # ReportInterviewInteractAction:
          #   deny: [{ group: all }]
          #   allow: []
        whatsapp:
          any:
            deny: [{ group: all, enabled: true }]
            allow: []
          # Report action: allow on whatsapp channel
          # ReportInterviewInteractAction:
          #   deny: []
          #   allow: [{ group: all, enabled: true }]
      user_groups: {}

  - action: jvagent/whatsapp_action
    context:
      enabled: true
      description: "WhatsApp provider (wppconnect, ultramsg, wwebjs)"
      provider: wwebjs
      session: ${WHATSAPP_SESSION}
