agent: resolv/ecrp_ai
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1
context:
  alias: ECRP AI Agent
  description: ECRP AI is the virtual assistant for the Resolv IMS System supporting the East Coast Road Improvement Project - Sheriff to Mahaica and Annadale to Orange Nassau Road which facilities alert dispatch, and redress management.
  enabled: true
  interaction_limit: 10 # Optional limit on number of interactions (resets after reaching limit)
actions:
  # ResponseGatingInteractAction - Determines when to respond, suppress, or defer
  # Runs before InteractRouter (weight -200); classifies utterance posture for realistic conversation
  - action: jvagent/response_gating
    context:
      enabled: true
      description: "Classifies utterance posture (RESPOND/SUPPRESS/DEFER) for realistic conversational behavior"
      model_action_type: "OpenAILanguageModelAction"
      model: gpt-4o-mini
      history_limit: 5
      enable_accumulation: true
      max_fragment_buffer: 5

  - action: jvagent/interact_router
    context:
      enabled: true
      description: "Intent-based routing action that analyzes utterances and routes to appropriate InteractActions"
      # Model Configuration
      model_action_type: "OpenAILanguageModelAction"
      history_limit: 3
      model: "gpt-4.1"

  - action: jvagent/openai_embedding
    context:
      enabled: true
      description: "OpenAI embeddings API for generating vector embeddings"
      # API Configuration
      api_key: ${OPENAI_API_KEY}
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: text-embedding-3-small
      embedding_dimensions: 1536
      timeout: 30

  # PageIndexRetrievalInteractAction - Vectorless RAG from indexed documents
  # Documents must be ingested first via POST /pageindex/documents
  - action: jvagent/pageindex_retrieval_interact_action
    context:
      enabled: true
      description: "Vectorless RAG - retrieves context from indexed documents via PageIndex graph"
      weight: -75 # Runs after InteractRouter, before Persona
      anchors:
        - "User asks a question about indexed documents"
        - "User requests information from document index"
        - "User wants to search or find information in documents"
    config:
      limit: 10
      strategy: "tree_search"
      node_summary: true # Required for tree_search; generates summaries during ingestion
      node_text: true
      doc_description: false
      max_token_num_each_node: 20000
      summary_token_threshold: 200
      # model: gpt-4o-mini  # Optional: override LLM for tree search

  - action: jvagent/openai_lm
    context:
      enabled: true
      description: "OpenAI GPT-4o model action with vision support"
      # API Configuration
      api_key: ${OPENAI_API_KEY}
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: "gpt-4.1-mini"
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  - action: jvagent/persona
    context:
      enabled: true
      description: "Persona action with LLM-driven behavioral parameters"
      # Persona Identity
      persona_name: "ECRP AI"
      persona_description: |
        You are the dedicated virtual assistant for the Resolv IMS System, providing clear informational and redress support to residents and commuters affected by the East Coast Road Improvement Project (Sheriff to Mahaica and Annadale to Orange Nassau Road). You are friendly, knowledgeable, and approachable. Help users understand how the EBRP AI framework works with clear, concise answers and best practices. Keep responses very short and concise. Do not give explanations unless asked.
      persona_capabilities:
        - "Provide updates via notifications on the East Coast Road Improvement Project (Sheriff to Mahaica and Annadale to Orange Nassau Road)."
        - "Record and file/submit incident reports related to the project."
        - "Answer questions about road closures, detours, or timelines."
        - "Share useful contact information for project-related inquiries."
        - "Change subscription preferences for notifications."
      # Model Configuration
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1-mini"
      model_temperature: 0.1
      model_max_tokens: 8192

  - action: resolv/report_interview_interact_action
    context:
      enabled: true
      description: "Report Interview action is used to create reports."
      weight: -50
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false

  - action: resolv/feedback_interview_interact_action
    context:
      enabled: true
      description: "Feedback Interview action is used to create feedback for incidents and projects."
      weight: -50
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false

  - action: resolv/subscription_interact_action
    context:
      enabled: true
      description: "Subscription action is used to present a link to the user to subscribe and unsubscribe from channels and groups."
      weight: -50

  - action: jvagent/converse_interact_action
    context:
      enabled: true
      description: "Fallback action for smalltalk and casual conversation"
      weight: 100 # Runs last as a safety net

  - action: resolv/onboarding_interact_action
    context:
      enabled: true
      description: "Onboarding action is used to register user and subscribe them to default groups."
      weight: -100

  - action: resolv/resolv_api_action
    context:
      enabled: true
      description: "Houses Resolv API credentials and endpoints"
      user_uuid: ${RESOLV_TEST_USER_UUID}
      secret_token: ${RESOLV_TEST_SECRET_TOKEN}
      api_url: ${RESOLV_TEST_API_URL}
      organization_slug: ${RESOLV_TEST_ORGANIZATION_SLUG}
      project_id: ${RESOLV_TEST_PROJECT_ID}
      # agent_identifier: ${RESOLV_TEST_AGENT_IDENTIFIER}

  - action: jvagent/access_control_action
    context:
      enabled: false
      description: "Role-based access control with session tracking and permission validation for secure agent operations"
      permissions:
        {
          "default":
            {
              "any":
                { "deny": [], "allow": [{ "group": "all", "enabled": True }] },
            },
          "whatsapp":
            {
              "any":
                {
                  "deny": [{ "user": "all", "enabled": True }],
                  "allow": [{ "user": "5926431530", "enabled": True }],
                },
            },
        }
      session_groups: {}

  - action: jvagent/agent_utils
    context:
      enabled: true
      description: "Agent Utils action for power user controls"

  - action: jvagent/whatsapp_action
    context:
      enabled: true
      description: "WhatsApp provider (wppconnect, ultramsg, wwebjs)"
      # whatsapp configuration
      provider: wwebjs
      api_url: ${WHATSAPP_API_URL}
      api_key: ${WHATSAPP_API_KEY}
      session: ${WHATSAPP_SESSION}
      base_url: ${APP_BASE_URL}
      token: ${WHATSAPP_TOKEN}

  - action: jvagent/tts_action
    context:
      enabled: true
      description: "Action for Text-to-Speech integration using multiple providers."
      provider: "elevenlabs"
      api_key: ${TTS_API_KEY}
      model: "eleven_turbo_v2"
      voice: "Sarah"

  - action: jvagent/stt_action
    context:
      enabled: true
      description: "Action for Speech-to-Text integration using multiple providers."
      provider: "deepgram"
      api_key: ${STT_API_KEY}
      model: "nova-2"
