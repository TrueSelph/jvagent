agent: resolv/moe_ai
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1
context:
  alias: MOE AI
  description: The MOE AI is the virtual assistant for the Resolv IMS System, managing and routing users to their subscribed agents—SERT AI or SILDSL AI—ensuring smooth transitions, consistent communication, and seamless access to project-specific support and information.
  enabled: true
actions:
  - action: jvagent/interact_router
    context:
      enabled: true
      description: "Intent-based routing action that analyzes utterances and routes to appropriate InteractActions"
      # Model Configuration
      model_action_type: "OpenAILanguageModelAction"
      history_limit: 3
      model: "gpt-4.1"

  - action: jvagent/openai_embedding
    context:
      enabled: true
      description: "OpenAI embeddings API for generating vector embeddings"
      # API Configuration
      api_key: ${OPENAI_API_KEY}
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: text-embedding-3-small
      embedding_dimensions: 1536
      timeout: 30

  - action: jvagent/intro_interact_action
    context:
      enabled: true
      description: "Introductory interact action for first-time users"
      directive: "Introduce yourself and briefly explain your capabilities."

  - action: jvagent/openai_lm
    context:
      enabled: true
      description: "OpenAI GPT-4o model action with vision support"
      # API Configuration
      api_key: ${OPENAI_API_KEY}
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: "gpt-4.1-mini"
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  - action: resolv/switchboard_interact_action
    context:
      enabled: true
      description: "Switchboard action for presenting and routing to available agents"
      weight: -10

  - action: resolv/switchboard_interview_interact_action
    context:
      enabled: true
      description: "This action allows the user to choose the agent they want to interact with."
      weight: -20
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: true

  - action: jvagent/persona
    context:
      enabled: true
      description: "Persona action with LLM-driven behavioral parameters"
      # Persona Identity
      persona_name: "Navi"
      persona_description: |
        You are a friendly and knowledgeable assistant that helps users
        understand how the resolv framework works. You provide clear,
        concise answers and demonstrate best practices. Keep your responses very short and concise. Do not give any explanation unless asked.
      persona_capabilities:
        - "Can onboard users"
        - "Routing users to their subscribed agents"
      # Model Configuration
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1-mini"
      model_temperature: 0.1
      model_max_tokens: 8192

  - action: jvagent/agent_utils
    context:
      enabled: true
      description: "Agent Utils action for power user controls"

  - action: jvagent/whatsapp_action
    context:
      enabled: true
      description: "WhatsApp provider (wppconnect, ultramsg, wwebjs)"
      # whatsapp configuration
      provider: wwebjs
      api_url: ${WHATSAPP_API_URL}
      api_key: ${WHATSAPP_API_KEY}
      session: ${WHATSAPP_SESSION}
      base_url: ${APP_BASE_URL}
      token: ${WHATSAPP_TOKEN}

  - action: jvagent/tts_action
    context:
      enabled: true
      description: "Action for Text-to-Speech integration using multiple providers."
      provider: "elevenlabs"
      api_key: ${TTS_API_KEY}
      model: "eleven_turbo_v2"
      voice: "Sarah"

  - action: jvagent/stt_action
    context:
      enabled: true
      description: "Action for Speech-to-Text integration using multiple providers."
      provider: "deepgram"
      api_key: ${STT_API_KEY}
      model: "nova-2"
