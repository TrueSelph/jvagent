agent: jvagent/skills_agent
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1
context:
  alias: Skills Agent
  description: A skill-driven agent with agentic loop capabilities, tool execution via MCP, skill loading,
    and extended thinking support. Excels at multi-step tasks like code review, research, and analysis.
  enabled: true
actions:
- action: jvagent/interact_router
  context:
    enabled: false
    description: 'Intent-based routing: dispatches multi-step tasks to SkillInteractAction'
    model_action_type: OpenAILanguageModelAction
    model: gpt-4.1-mini
    history_limit: 3
    enable_routing_cache: true
- action: jvagent/openai_lm
  context:
    enabled: true
    description: Default OpenAI LM for this agent; SkillInteractAction overrides `model` / reasoning in
      its own context. Align defaults here with the loop model for predictable behavior when resolving
      the same action type.
    api_key: ${OPENAI_API_KEY}
    api_endpoint: https://api.openai.com/v1
    model: gpt-4.1
    max_tokens: 32768
    reasoning_effort: medium
    timeout: 180
- action: jvagent/ollama_lm
  context:
    enabled: true
    description: Optional Ollama endpoint — switch skill_interact_action to OllamaLanguageModelAction
      and set model to use this provider instead of OpenAI.
    api_endpoint: https://ollama.com
    api_key: ${OLLAMA_API_KEY}
    model: kimi-k2.6:cloud
    temperature: 0.2
    max_tokens: 16384
    timeout: 120
# Reference MCP setup: sandboxed stdio filesystem via npx + @modelcontextprotocol/server-filesystem.
# - sandbox_mode / sandbox_user_scoped confine reads/writes to <files_root>/<agentId>/<userId>/.
# - With JVSPATIAL_FILE_STORAGE_PROVIDER=s3, MCPAction swaps in python -m jvagent.action.mcp.jvspatial_fs_server
#   (see jvagent/action/mcp/README.md). For in-process user file I/O without MCP, use the fileinterface skill.
- action: jvagent/mcp
  context:
    enabled: true
    description: >
      Example MCP gateway with a sandboxed filesystem server (npx). Registers tools under tool_servers
      for SkillInteractAction; fulfills multi-server patterns alongside streamable_http MCP apps.
    model_action_type: OpenAILanguageModelAction
    model: gpt-4o-mini
    sandbox_mode: true
    sandbox_user_scoped: true
    servers:
      - name: filesystem
        enabled: true
        transport: stdio
        command: npx
        args:
          - -y
          - "@modelcontextprotocol/server-filesystem"
        mcp_connect_timeout: 15
        mcp_call_timeout: 60
        tools: "-all"
        denied_tools: []
- action: jvagent/serper_web_search
  context:
    enabled: true
    description: Serper Google Search provider
    engine: google_light
    hl: en
    max_results: 10
- action: jvagent/pageindex_action
  context:
    enabled: true
    description: PageIndex vectorless RAG — search, ingest, and manage documents
    strategy: tree_search
    limit: 10
    node_summary: true
- action: jvagent/skill_interact_action
  context:
    enabled: true
    description: 'Agentic loop for multi-step tasks: thinks, calls tools, observes results, and iterates
      until the task is complete. Uses OpenAI o4-mini; OpenAILanguageModelAction maps ReasoningModelConfig
      (below) to native Chat Completions fields. Swap model_action_type / model to use Anthropic, OpenRouter,
      or Ollama — the same generic keys apply; each provider translates them (see docs/language-models.md).'
    weight: -60
    anchors:
    - User asks to review, analyze, audit, or fix code
    - User requests a multi-step task that requires tool use
    - User wants the agent to search files and synthesize information
    - User asks the agent to read files and provide feedback
    - User requests debugging or troubleshooting with file inspection
    model_action_type: OpenAILanguageModelAction
    model: gpt-4.1
    reasoning_enabled: false
    model_max_tokens: 32768
    stream_thinking: true
    stream_reasoning: true
    max_iterations: 25
    max_duration_seconds: 300
    response_mode: respond
    skills:
    - code_review
    - answer
    - pageindex_search
    - pageindex_docs
    - web_search
    - skill_hub
    - gws-docs-write
    skills_source: both
    denied_skills: []
    strict_grounding: true
    plan_first: true
    enable_skill_helper_tools: true
    max_skill_activations: 10
    stuck_detection_window: 3
    max_midcourse_corrections: 2
    task_nudge_retry_limit: 4
    final_review: true
    # MCP filesystem server name(s) from jvagent/mcp — exposes mcp_filesystem__* tools in the loop.
    tool_servers:
      - filesystem
    stream_tool_progress: true
    max_full_tool_results: 10
- action: jvagent/persona
  context:
    enabled: true
    description: Persona for simple conversational responses (non-tool-use queries)
    persona_name: Skills Assistant
    persona_description: You are a helpful, skillful assistant. For simple questions, respond directly.
      For complex tasks that require file operations, web searches, or multi-step reasoning, inform the
      user that you can perform those tasks and describe what you would do.
    persona_capabilities:
    - Answer general knowledge questions
    - Explain concepts clearly and concisely
    - Perform multi-step code reviews with tool use
    - Search and analyze files in the workspace
    - Research topics with web search (when configured)
    model_action_type: OpenAILanguageModelAction
    model: gpt-4.1-mini
    model_temperature: 0.2
    model_max_tokens: 32768
- action: jvagent/converse_interact_action
  context:
    enabled: false
    description: Smalltalk fallback for casual conversation
    weight: 100
