# Executive Agent — SkillExecutive reference configuration (ADR-0012)
#
# The reference agent for the single-orchestrator SkillExecutive pattern. A
# SkillExecutiveInteractAction at weight -200 owns the whole turn: it resumes an
# active flow if one owns the turn (deterministic continuation), otherwise runs
# a think-act-observe loop over the agent's unified tool surface — the persona's
# reply/respond tools, anchored interact-actions exposed as tools, plain action
# tools (web search), core tools, and native SOP skills. Routing is tool
# selection; turn-lock is an emergent property of a flow that isn't done.
#
# The single pattern orchestrator at the -200 slot.

agent: jvagent/executive_agent
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1

context:
  # Identity (ADR-0014): alias + role form the agent's identity, injected into
  # the SkillExecutive's core prompt so the model reasons and writes as the agent.
  alias: Executive Agent
  role: >-
    a helpful assistant that reasons with tools and skills and answers in a
    clear, concise voice
  description: >-
    SkillExecutive-pattern agent. One orchestrator (-200) locks onto an active
    flow when present, otherwise reasons and acts over the agent's tool surface,
    replying through the reply/respond egress (ReplyAction).
  enabled: true
  interaction_limit: 20

actions:
  # ── SkillExecutiveInteractAction — the single orchestrator ──
  - action: jvagent/skill_executive
    context:
      enabled: true
      model: kimi-k2.6:cloud
      model_action_type: OllamaLanguageModelAction
      model_temperature: 0.2
      # Agentic/research headroom: each tick is one tool call, so multistep
      # research (search/fetch/write/reply) needs a generous ceiling. The
      # repeat-guard still bounds runaway loops. Thinking models also want more
      # completion tokens (reasoning can count against the budget).
      activation_budget: 40
      model_max_tokens: 4096
      # Prior turns fed into the loop prompt (working context). The rolling
      # memory window is the agent's `interaction_limit` above.
      history_limit: 10
      # Deterministic turn-lock: an active flow's IA owns each turn until it
      # clears its task. Set false for model-mediated (interruptible) continuation.
      lock_active_flow: true

      # -- Reasoning (only bites with a reasoning-capable model; gpt-4o-mini
      # ignores it). Set effort for o-series / Claude thinking / OpenRouter.
      # reasoning_enabled: true
      # reasoning_effort: medium          # low | medium | high
      # reasoning_budget_tokens: 0        # explicit thinking budget (Anthropic)

      # -- Thinking / progress stream (needs a live response bus).
      stream_internal_progress: true     # emit each tick as a 'thought' bubble
      stream_reasoning_trace: true       # surface the model's thinking trace

      # -- Budgets (activation_budget caps ticks; these add wall-clock + length).
      max_duration_seconds: 0             # 0 disables the wall-clock cap
      max_statement_length:               # soft reply-length cap (chars); blank = off

      # -- Tooling / egress-UX.
      tool_tier: standard                 # minimal | standard | full
      tool_call_timeout: 0                # per-tool-call timeout (s); 0 disables
      block_raw_tool_invocation: true    # force find_tool/skill for hidden tools
      enable_transient_ack: true         # emit ack(s) while a slow turn runs
      first_emit_timeout_ms: 2000        # delay before the FIRST ack
      ack_interval_ms: 12000             # delay between subsequent acks
      ack_statements:                    # transient 'working on it' line(s), emitted in order
        - "Working on it…"
        - "Still on it — almost there…"
      max_concurrent_tools: 0             # 0 = unbounded

      # -- MCP tool servers: '-all' pulls tools from every enabled jvagent/mcp
      # action; or list action names. Tools surface as mcp_<server>__<tool>.
      tool_servers: "-all"

      # Native SOP skills. Source: app (adjacent skills/) | library
      # (jvagent/skills) | both. `skills` is a finite list of names to load
      # (fnmatch patterns ok); use "-all" for every discovered skill.
      skills_source: both
      skills:
        - web_lookup      # app-local (agents/jvagent/executive_agent/skills/)
        - research        # library (jvagent/skills/)

  # MCP gateway: a sandboxed filesystem server (npx). Its tools surface to the
  # executive (tool_servers above) as mcp_filesystem__<tool>, sandboxed per
  # agent + per user.
  - action: jvagent/mcp
    context:
      enabled: true
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      sandbox_mode: true
      sandbox_user_scoped: true
      servers:
        - name: filesystem
          enabled: true
          transport: stdio
          command: npx
          args:
            - -y
            - "@modelcontextprotocol/server-filesystem"
          mcp_connect_timeout: 15
          mcp_call_timeout: 60
          tools: "-all"
          denied_tools: []

  - action: jvagent/serper_web_search
    context:
      enabled: true

  # Read full pages after a search surfaces URLs (web_fetch__fetch). SSRF-guarded
  # by default; raises research quality and cuts redundant snippet searches.
  - action: jvagent/web_fetch
    context:
      enabled: true
      max_chars: 8000

  # Always-execute IA runs BEFORE the executive in the weight chain.
  - action: jvagent/intro_interact_action
    context:
      enabled: true

  # ── Supporting actions ──
  - action: jvagent/openai_lm
    context:
      enabled: true
      api_endpoint: https://api.openai.com/v1
      model: gpt-4o-mini
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  # ── Ollama Language Model (agentic loop) ──
  - action: jvagent/ollama_lm
    context:
      enabled: true
      description: Ollama cloud endpoint for the cockpit agentic loop
      api_endpoint: https://ollama.com
      # API key is env-only — set OLLAMA_API_KEY in your environment.
      model: kimi-k2.6:cloud
      temperature: 0.2
      max_tokens: 16384
      timeout: 120

  # ReplyAction — the SkillExecutive-native egress voice (ADR-0014). Identity
  # comes from the Agent (alias + role above); ReplyAction just voices output.
  # PersonaAction stays available as the fallback responder for Rails agents.
  - action: jvagent/reply
    context:
      enabled: true
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      model_temperature: 0.3

  - action: jvagent/signup_interview_interact_action
    context:
      enabled: true
      description: "Training signup interview — anchored, turn-locking flow"
      anchors:
        - "sign up for jvagent training"
        - "register for jvagent training"
        - "enroll in training"
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4o-mini"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false
