# Unified Agent — single agent_interact_action with retrieval skills
# Demonstrates the new unified skill-routing architecture.
#
# Architecture (multi-provider):
#   Phase 1 — SkillRouter:   router_model_action_type → OpenAI GPT-4o-mini
#   Phase 2a — Converse:  converse_model_action_type → OpenAI GPT-4o-mini
#   Phase 2b — Skill loop:   model_action_type → Ollama cloud (agentic loop)
#
# Register one jvagent language-model action per provider; point each phase at the
# right class name.  All advanced tuning params use sensible defaults — see
# jvagent/action/agent_interact/agent_interact_action.py for the full Tier 2 list.
#
# Skills:
#   - pageindex_search   → internal knowledge base search (requires PageIndexAction)
#   - pageindex_docs      → document management: list, ingest, delete (requires PageIndexAction)
#   - web_search          → public web search fallback (requires SerperWebSearchAction)
#
# The model can call skill_search / list_skills mid-loop to discover and activate
# additional skills on demand.

agent: jvagent/unified_agent
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1

context:
  alias: Unified Agent
  description: >-
    A search-first agent powered by AgentInteractAction.
    Routes intent and small talk via OpenAI (GPT-4o-mini); runs the agentic
    skill loop on Ollama cloud. Pre-loaded with pageindex_search, pageindex_docs,
    and web_search skills.
  enabled: true
  interaction_limit: 20

actions:
  # ── Unified routing + agentic skill loop (replaces InteractRouter + SkillInteractAction) ──
  - action: jvagent/agent_interact_action
    context:
      enabled: true
      # ── Router ──
      router_model: gpt-4o-mini
      router_model_action_type: OpenAILanguageModelAction
      enable_canned_response: true
      enable_routing_cache: true
      # ── Converse fast path ──
      converse_enabled: true
      converse_model_action_type: OpenAILanguageModelAction
      converse_model: gpt-4o-mini
      # ── Skill loop ──
      model_action_type: OllamaLanguageModelAction
      model: deepseek-v4-flash:cloud
      skills:
        - pageindex_search
        - pageindex_docs
        - web_search
      skills_source: both
      max_iterations: 25
      strict_grounding: true
      response_mode: respond

  # ── Ollama Language Model (agentic loop) ──
  - action: jvagent/ollama_lm
    context:
      enabled: true
      description: Ollama cloud endpoint for the agentic skill loop
      api_endpoint: https://ollama.com
      api_key: ${OLLAMA_API_KEY}
      model: kimi-k2.6:cloud
      temperature: 0.2
      max_tokens: 16384
      timeout: 120

  # ── OpenAI Language Model (routing + persona) ──
  - action: jvagent/openai_lm
    context:
      enabled: true
      description: OpenAI GPT-4o-mini for fast routing and persona
      api_key: ${OPENAI_API_KEY}
      api_endpoint: https://api.openai.com/v1
      model: gpt-4o-mini
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  # ── PageIndex Action (dependency of pageindex_search + pageindex_docs) ──
  - action: jvagent/pageindex_action
    context:
      enabled: true
      description: Vectorless RAG — indexes documents and provides search / ingest / management APIs
      strategy: tree_search
      limit: 10
      node_summary: true
    config:
      node_text: true
      summary_token_threshold: 200

  # ── Serper Web Search (dependency of web_search skill) ──
  - action: jvagent/serper_web_search
    context:
      enabled: true
      description: Serper Google Search provider
      engine: google_light
      hl: en
      max_results: 10

  # ── Persona Action ──
  - action: jvagent/persona
    context:
      enabled: true
      description: Persona for final response rewriting (used when response_mode=respond)
      persona_name: Research Assistant
      persona_description: >-
        You are a knowledgeable research assistant with access to internal documents
        and the public web.  For simple questions, respond directly and concisely.
        For complex research tasks, you search internal sources first, supplement with
        web search when needed, and synthesize clear, cited answers.
      persona_capabilities:
        - Answer questions from internal knowledge base
        - Search the web for current information
        - Ingest and manage documents
        - Synthesize multi-source research findings
        - Provide clear, cited, evidence-backed answers
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      model_temperature: 0.2
      model_max_tokens: 8192
