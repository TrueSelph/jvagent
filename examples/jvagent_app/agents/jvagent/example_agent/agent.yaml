  #         response: "Give accurate technical details while keeping explanations accessible."

  # Signup Interview Interact Action - Training signup interview flow
  # Local action from: agents/jvagent/example_agent/actions/jvagent/signup_interview_interact_action/
  - action: jvagent/signup_interview_interact_action
    context:
      enabled: true
      description: "Training signup interview flow for user registration and training scheduling"
      weight: -50  # Runs after InteractRouter but before PersonaAction
      # Anchors for InteractRouter routing - REQUIRED when using InteractRouter
      # Must cover both initial entry and intermediate states (when answering questions)
      anchors:
        # Initial entry - starting training signup
        - "User wants to sign up or register for jvagent training"
        - "User wants to enroll or join jvagent training"
        # Intermediate state - answering questions
        - "User is providing or answering training signup questions"
        - "User is completing training registration or providing availability"
        # Revision/edit - changing previously provided information
        - "User wants to change, update, or correct their name, email, or availability"
        - "User is revising, editing, or updating training signup information"
      # Model Configuration (for unified classification and extraction)
      # These settings are used by the parent InterviewInteractAction for all LLM calls
      # The unified classification detects intent (CANCELLATION, CONFIRMATION, UPDATE, SUBMISSION, NONE)
      # and extracts field values in a single LLM call
      model_action_type: "OpenAILanguageModelAction"  # Entity type to find dynamically
      model: "gpt-4o-mini"  # Model for unified classification and extraction
      model_temperature: 0.1  # Temperature for LLM generation
      model_max_tokens: 4096  # Max tokens for LLM generation
      use_history: true  # Use conversation history for LLM generation
      max_statement_length: 100  # Max length of statement to include in history
      history_limit: 3  # Max number of statements to include in history
    # actions:
    #   - action: jvagent/example_interact_action
    #     context:
    #       enabled: true
    #       description: "Example interact action for handling complex conversations"
    #       weight: -50


  - action: jvagent/converse_interact_action
    context:
      enabled: true
      description: "Fallback action for smalltalk and casual conversation"
      weight: 100  # Runs last as a safety net
