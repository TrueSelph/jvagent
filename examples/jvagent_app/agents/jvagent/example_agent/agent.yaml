# Example Agent Configuration
# This file defines the agent's metadata, configuration, and action assignments

# Agent reference in namespace/agent_name format
agent: jvagent/example_agent

# Agent metadata
version: 1.0.0
author: V75 Inc.

# jvagent version requirement (optional)
jvagent: ~0.0.1

# Agent context: Properties that configure the agent
context:
  alias: Example Agent
  description: An example agent demonstrating jvagent agent configuration
  enabled: true

# Action Assignments
# Actions are discovered from:
# 1. Local actions: actions/{namespace}/{action_name}/ (takes precedence)
# 2. Core actions: jvagent library (jvagent/action/*/) if not found locally
# Actions are referenced using the format: namespace/action_name
#
# Core actions (loaded from jvagent library if no local override exists):
# - jvagent/interact_router
# - jvagent/openai_embedding, jvagent/openai_lm
# - jvagent/typesense_vectorstore
# - jvagent/retrieval_interact_action
#
# Local overrides/custom actions:
# - jvagent/persona (custom ExamplePersonaAction override)
# - jvagent/example_action (custom action)
actions:
  - action: jvagent/agent_utils
    context:
      enabled: true
      description: "Agent Utils action for power user controls"

  # InteractRouter Action - Intent-based routing for InteractActions
  # Core action from jvagent library (jvagent/action/router/)
  - action: jvagent/interact_router
    context:
      enabled: true
      description: "Intent-based routing action that analyzes utterances and routes to appropriate InteractActions"
      # Model Configuration (uses OpenAI model action by entity type)
      model_action_type: "OpenAILanguageModelAction" # Entity type to find dynamically
      history_limit: 3 # Number of previous interactions to include in context
      # Optional: List of InteractAction entity names that must always execute.
      # When using the InteractAction.always_execute flag, exceptions can be
      # managed declaratively in code instead of being listed here.

  # OpenAI Embedding Model Action - Vector embeddings for semantic search
  # Core action from jvagent library (jvagent/action/model/embedding/openai/)
  - action: jvagent/openai_embedding
    context:
      enabled: true
      description: "OpenAI embeddings API for generating vector embeddings"
      # API Configuration
      api_key: ${OPENAI_API_KEY} # Set in .env or environment
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: text-embedding-3-small # Default embedding model
      embedding_dimensions: 1536 # Expected dimensions (0 = auto-detect)
      timeout: 30

  - action: jvagent/intro_interact_action
    context:
      enabled: true
      description: "Introductory interact action for first-time users"

  # TypesenseVectorStore Action - Vector store for semantic search
  # Core action from jvagent library (jvagent/action/vectorstore/typesense/)
  - action: jvagent/typesense_vectorstore
    context:
      enabled: true
      description: "Typesense vector store for semantic search and context retrieval"
      # Typesense Configuration
      host: localhost
      port: 8108
      protocol: http
      api_key: ${TYPESENSE_API_KEY} # Set in .env or environment
      connection_timeout_seconds: 2
      embedding_dimensions: 1536 # Must match embedding model dimensions
      # Embedding Model Configuration
      embedding_model_action_type: "OpenAIEmbeddingModelAction" # Entity type to find dynamically

  # OpenAI Language Model Action - LLM integration with multimodal support
  # Core action from jvagent library (jvagent/action/model/language/openai/)
  - action: jvagent/openai_lm
    context:
      enabled: true
      description: "OpenAI GPT-4o model action with vision support"
      # API Configuration
      api_key: ${OPENAI_API_KEY} # Set in .env or environment
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: gpt-4o-mini # Default model for queries
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  # Persona Action - Core interact action for agent behavioral modeling
  # Core action from jvagent library (jvagent/action/persona/)
  - action: jvagent/persona
    context:
      enabled: true
      description: "Persona action with LLM-driven behavioral parameters"
      # Persona Identity
      persona_name: "Example Assistant"
      persona_description: |
        You are a friendly and knowledgeable assistant that helps users
        understand how the jvagent framework works. You provide clear,
        concise answers and demonstrate best practices.
      persona_capabilities:
        - "Answer questions about jvagent"
        - "Demonstrate action delegation"
        - "Process user interactions with behavioral parameters"
        - "Provide streaming and non-streaming responses"
        - "can sign the user up for jvagent training"
      # Voice Channel Configuration (Optional)
      # Phonetic substitutions for text-to-speech when channel="voice"
      # Maps original terms to phonetic replacements for proper pronunciation
      # phonetic_substitutions:
      #   essequibo: "esseequibbo"
      #   API: "A P I"
      #   jvagent: "jay-vee agent"
      # Model Configuration (uses OpenAI model action by entity type)
      model_action_type: "OpenAILanguageModelAction" # Entity type to find dynamically
      model: "gpt-4o-mini"
      model_temperature: 0.1
      model_max_tokens: 8192

  # Signup Interview Interact Action - Training signup interview flow
  # Local action from: agents/jvagent/example_agent/actions/jvagent/signup_interview_interact_action/
  - action: jvagent/signup_interview_interact_action
    context:
      enabled: true
      description: "Training signup interview flow for user registration and training scheduling"
      weight: -50 # Runs after InteractRouter
      anchors:
        - "User wants to sign up or register for jvagent training"
        - "User wants to enroll or join jvagent training"
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1-mini"
      model_temperature: 0.1
      model_max_tokens: 4096
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false
  - action: jvagent/converse_interact_action
    context:
      enabled: true
      description: "Fallback action for smalltalk and casual conversation"
      weight: 100 # Runs last as a safety net
      # directive: |
      #   Offer a simple, friendly response to smalltalk and casual conversation ONLY.
      #   NEVER attempt to answer knowledge-based or capability based questions without having applicable directives or certainty
      #   about the context. If the conversation does not warrant a reply or you
      #   lack sufficient information, politely opt out rather than guessing.
      # parameters:
      #   - condition: "User asks a knowledge-based, capability based, or factual question"
      #     response: "Politely decline to answer, explaining that you don't have sufficient information or certainty to provide an accurate answer. Suggest they check official sources or provide more specific context."
      #   - condition: "User engages in smalltalk, greetings, or casual conversation"
      #     response: "Respond naturally and conversationally, keeping it brief and friendly."
      #   - condition: "The conversation does not warrant a substantive reply"
      #     response: "Politely acknowledge the message but indicate that no specific response is needed, or ask how you can help."
      #   - condition: "User asks about something outside your knowledge or role"
      #     response: "Politely explain that this falls outside your area of knowledge or role, and suggest alternative ways they might find the information they need."

  # - action: jvagent/whatsapp_action
  #   context:
  #     enabled: true
  #     description: "WhatsApp provider (wppconnect, ultramsg, wwebjs)"
  #     # whatsapp configuration
  #     provider: "wwebjs"
  #     api_url: ${WHATSAPP_API_URL}
  #     api_key: ${WHATSAPP_API_KEY}
  #     session: ${WHATSAPP_SESSION}
  #     base_url: ${APP_BASE_URL}

  - action: jvagent/tts_action
    context:
      enabled: true
      description: "Action for Text-to-Speech integration using multiple providers."
      provider: "elevenlabs"
      api_key: ${TTS_API_KEY}
      model: "eleven_turbo_v2"
      voice: "Sarah"

  - action: jvagent/stt_action
    context:
      enabled: true
      description: "Action for Speech-to-Text integration using multiple providers."
      provider: "deepgram"
      api_key: ${STT_API_KEY}
      model: "nova-2"

  # Add more action assignments here
  # Actions can be from different namespaces:
  # - action: custom/custom_action
  #   context:
  #     enabled: true
  #     custom_property: value
  #
  # - action: contrib/another_action
  #   context:
  #     enabled: true
  #     timeout: 120
