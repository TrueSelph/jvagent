# Example Agent Configuration
#
# Bridge-driven pattern: jvagent/bridge orchestrates ReflexHelm + ReasoningHelm
# at weight -200. Intro, persona, signup interview, and pageindex retrieval
# actions still run in the InteractWalker chain.
#
# See docs/BRIDGE.md for bridge architecture.

agent: jvagent/example_agent
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1

context:
  alias: Example Agent
  description: An example agent demonstrating jvagent agent configuration on bridge+helm
  enabled: true

# Action assignments
# Local actions (agents/jvagent/example_agent/actions/...) take precedence
# over core actions of the same name.
actions:

  # ── Greeting + RAG ───────────────────────────────────────
  - action: jvagent/intro_interact_action
    context:
      enabled: true
      description: "Introductory interact action for first-time users"

  # ── Bridge (multi-helm orchestrator at weight -200) ──────
  - action: jvagent/bridge
    context:
      enabled: true
      helms:
        - ReflexHelm
        - ReasoningHelm
      default_helm: ReflexHelm
      shift_budget_per_turn: 4
      first_emit_timeout_ms: 2500
      safety_net_ack_text: "Still working on this…"
      denied_response_text: "Sorry, I can't do that here."

  # ── ReflexHelm (fast classifier) ──────────────────────────
  - action: jvagent/reflex_helm
    context:
      enabled: true
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      model_temperature: 0.0
      model_max_tokens: 256
      timeout_seconds: 3.0
      history_limit: 4
      default_shift_target: ReasoningHelm
      can_emit_directly: true
      fallback_text: "Sorry — I couldn't process that. Could you rephrase or try again?"

  # ── ReasoningHelm (router + agentic loop) ────────────────
  - action: jvagent/reasoning_helm
    context:
      enabled: true
      description: >
        ReasoningHelm runs the deliberate think/act/observe loop. Skills can be
        added to ``skills`` once registered on the agent.
      router_model: gpt-4o-mini
      router_model_action_type: OpenAILanguageModelAction
      model_action_type: OllamaLanguageModelAction
      model: glm-5.1:cloud
      skills: []                  # add skill bundles here as they are installed
      skills_source: both
      max_iterations: 25
      history_limit: 5
      response_mode: respond
      stream_internal_progress: true

  # ── Language Models ──────────────────────────────────────
  - action: jvagent/ollama_lm
    context:
      enabled: true
      description: "Ollama cloud endpoint — primary engine for the cockpit agentic loop"
      api_endpoint: https://ollama.com
      # API key is env-only — set OLLAMA_API_KEY in your environment.
      model: deepseek-v4-flash:cloud
      temperature: 0.2
      max_tokens: 16384
      timeout: 120

  - action: jvagent/openai_lm
    context:
      enabled: true
      description: "OpenAI GPT-4o model action with vision support; used by router and persona"
      # API key is env-only — set OPENAI_API_KEY in your environment.
      api_endpoint: https://api.openai.com/v1
      model: gpt-4o-mini
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  - action: jvagent/pageindex_action
    context:
      enabled: true
      description: "Core PageIndex — ingest and search APIs for documents"
    config:
      limit: 10
      strategy: "tree_search"
      node_summary: true
      node_text: true
      doc_description: false
      max_token_num_each_node: 20000
      summary_token_threshold: 200

  # ── Persona ──────────────────────────────────────────────
  - action: jvagent/persona
    context:
      enabled: true
      description: "Persona action with LLM-driven behavioral parameters"
      persona_name: "Example Assistant"
      persona_description: |
        You are a friendly and knowledgeable assistant that helps users
        understand how the jvagent framework works. You provide clear,
        concise answers and demonstrate best practices.
      persona_capabilities:
        - "Answer questions about jvagent"
        - "Demonstrate action delegation"
        - "Process user interactions with behavioral parameters"
        - "Provide streaming and non-streaming responses"
        - "Sign the user up for jvagent training"
        - "Answer questions from indexed documents (when documents are ingested)"
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4o-mini"
      model_temperature: 0.1
      model_max_tokens: 8192

  # ── SentDM broadcast (SMS / WhatsApp) ────────────────────
  # Sends template-based broadcasts via the SentDM v3 API. Requires the
  # SENTDM_API_KEY environment variable. For webhook auto-registration of
  # delivery events, also set JVAGENT_PUBLIC_BASE_URL and
  # JVSPATIAL_JWT_SECRET_KEY. Templates must already exist in your SentDM
  # account (create them via the SentDM dashboard).
  - action: jvagent/sentdm_broadcast_action
    context:
      enabled: true
      description: "SentDM broadcast — template-based SMS / WhatsApp messages"
      default_channels: ["sms"]
      # Uncomment to set an account-wide fallback template:
      # default_template_name: "order_confirmation"
      # default_template_id: ""
#      profile_id: "5311d08c-f79a-41b1-8ebb-1f0efaefdf8f"
      sandbox: true                 # validate only, no real send — flip to false to go live
      timeout: 30
      # Webhook tuning (used when JVAGENT_PUBLIC_BASE_URL is set)
      webhook_display_name: "jvagent SentDM"
      webhook_event_types: ["message"]
      # webhook_event_filters: {}  # omit Sent event_filters (all message.*); default includes queued + received + outbound lifecycle
      webhook_retry_count: 3
      webhook_timeout_seconds: 30
      # Graph persistence — each send creates a SentDMBroadcastRecord node
      # (one per recipient/channel), and the inbound webhook handler folds
      # delivery events into it. Disable persist_records to skip entirely.
      persist_records: true
      # Sandbox validates only — no carrier send. Records are skipped unless true:
      persist_sandbox_sends: true
      record_event_history_limit: 25

  # ── Signup interview (local custom action) ───────────────
  - action: jvagent/signup_interview_interact_action
    context:
      enabled: true
      description: "Training signup interview flow for user registration and training scheduling"
      weight: -50
      anchors:
        - "User wants to sign up or register for jvagent training"
        - "User wants to enroll or join jvagent training"
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4o-mini"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false
