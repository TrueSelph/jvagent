# Example Agent Configuration
# This file defines the agent's metadata, configuration, and action assignments

# Agent reference in namespace/agent_name format
agent: jvagent/example_agent

# Agent metadata
version: 1.0.0
author: V75 Inc.

# jvagent version requirement (optional)
jvagent: ~0.0.1

# Agent context: Properties that configure the agent
context:
  alias: Example Agent
  description: An example agent demonstrating jvagent agent configuration
  enabled: true

# Action Assignments
# Actions are discovered from namespace subdirectories: actions/{namespace}/{action_name}/
# Actions are referenced using the format: namespace/action_name
actions:
  # InteractRouter Action - Intent-based routing for InteractActions
  # Located at: jvagent/action/router/
  - action: jvagent/interact_router
    context:
      enabled: true
      description: "Intent-based routing action that analyzes utterances and routes to appropriate InteractActions"
      # Model Configuration (uses OpenAI model action by entity type)
      model_action_type: "OpenAILanguageModelAction"  # Entity type to find dynamically
      history_limit: 10  # Number of previous interactions to include in context
      # Optional: List of InteractAction entity names that must always execute
      # exceptions:
      #   - "PersonaAction"
      #   - "AnotherAction"
  
  # OpenAI Embedding Model Action - Vector embeddings for semantic search
  # Located at: agents/jvagent/example_agent/actions/jvagent/openai_embedding/
  - action: jvagent/openai_embedding
    context:
      enabled: true
      description: "OpenAI embeddings API for generating vector embeddings"
      # API Configuration
      api_key: ${OPENAI_API_KEY}  # Set in .env or environment
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: text-embedding-3-small  # Default embedding model
      embedding_dimensions: 1536  # Expected dimensions (0 = auto-detect)
      timeout: 30
  
  # TypesenseVectorStore Action - Vector store for semantic search
  # Located at: jvagent/action/vectorstore/typesense.py
  - action: jvagent/typesense_vectorstore
    context:
      enabled: true
      description: "Typesense vector store for semantic search and context retrieval"
      # Typesense Configuration
      host: localhost
      port: 8108
      protocol: http
      api_key: ${TYPESENSE_API_KEY}  # Set in .env or environment
      connection_timeout_seconds: 2
      embedding_dimensions: 1536  # Must match embedding model dimensions
      # Embedding Model Configuration
      embedding_model_action_type: "OpenAIEmbeddingModelAction"  # Entity type to find dynamically
      embedder_type: model_action  # Use model action instead of sentence-transformers
      default_collection: example_agent
  
  # RetrievalInteractAction - Context retrieval from vector stores
  # Located at: jvagent/action/retrieval/
  - action: jvagent/retrieval_interact_action
    context:
      enabled: true
      description: "Retrieves context from vector stores and adds directives for PersonaAction"
      # VectorStore Configuration
      vectorstore_action_type: "TypesenseVectorStore"  # Entity type to find dynamically
      collection: "example_agent"  # Collection name to search in
      k: 5  # Number of search results to retrieve
      weight: -50  # Runs after InteractRouter but before PersonaAction
      # Anchors for routing - published to InteractRouter
      # The entity name (RetrievalInteractAction) is automatically used as the key
      anchors:
        - "User asks a knowledge-based question"
        - "User requests information from knowledge base"
        - "User needs context or knowledge retrieval"
        - "User asks a question requiring search"
        - "User wants to find information"
        - "User queries knowledge base"
        - "User seeks information or facts"
        - "User asks about something that requires context retrieval"
      # Optional: Minimum similarity score threshold (0.0-1.0)
      # min_score_threshold: 0.7
      # Optional: Custom directive template
      # directive_template: |
      #   Relevant information:
      #   {results}
      #   Use this information in your response.
  
  # OpenAI Language Model Action - LLM integration with multimodal support
  # Located at: agents/jvagent/example_agent/actions/jvagent/openai_lm/
  - action: jvagent/openai_lm
    context:
      enabled: true
      description: "OpenAI GPT-4o model action with vision support"
      # API Configuration
      api_key: ${OPENAI_API_KEY}  # Set in .env or environment
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: gpt-4o-mini  # Default model for queries
      temperature: 0.7
      max_tokens: 2000
      top_p: 1.0
      timeout: 60
  
  # Persona Action - Core interact action for agent behavioral modeling
  # Located at: agents/jvagent/example_agent/actions/jvagent/persona/
  - action: jvagent/persona
    context:
      enabled: true
      description: "Example persona action with LLM-driven behavioral parameters"
      # Persona Identity
      persona_name: "Example Assistant"
      persona_role: "A helpful AI assistant for demonstrations"
      persona_description: >
        You are a friendly and knowledgeable assistant that helps users
        understand how the jvagent framework works. You provide clear,
        concise answers and demonstrate best practices.
      persona_capabilities:
        - "Answer questions about jvagent"
        - "Demonstrate action delegation"
        - "Process user interactions with behavioral parameters"
        - "Provide streaming and non-streaming responses"
      # Model Configuration (uses OpenAI model action by entity type)
      model_action_type: "OpenAILanguageModelAction"  # Entity type to find dynamically
      model_name: "gpt-4o-mini"
      model_temperature: 0.3
      model_max_tokens: 4096
      # Optional: Custom prompt template (uses default if not provided)
      # prompt: "Your custom prompt template here"
      # Optional: Custom parameters (can also be set in the action class)
      # parameters:
      #   - condition: "User asks about X"
      #     response: "Provide information about X"
  
  # Example action from the 'jvagent' namespace
  # Located at: agents/jvagent/example_agent/actions/jvagent/example_action/
  - action: jvagent/example_action
    context:
      enabled: true
      description: "Customized example action for demonstration"
      timeout: 60
      retries: 5
      api_endpoint: "https://prod.api.example.com"
  
  # Add more action assignments here
  # Actions can be from different namespaces:
  # - action: custom/custom_action
  #   context:
  #     enabled: true
  #     custom_property: value
  # 
  # - action: contrib/another_action
  #   context:
  #     enabled: true
  #     timeout: 120
