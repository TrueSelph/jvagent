# Persona Action Package Descriptor

package:
  # Action name in namespace/action_name format
  name: jvagent/persona
  
  # Package author
  author: jvagent
  
  # Archetype: The main Action class name
  archetype: PersonaAction
  
  # Package version
  version: 1.0.0
  
  # Package metadata
  meta:
    title: Persona Action
    description: Simplified tool-based action for applying agent prompts with configurable parameters
    group: jvagent
    type: action
  
  # Package configuration
  config:
    singleton: true  # Only one persona action per agent
  
  # Package dependencies
  dependencies:
    jvagent: ~2.1.0

