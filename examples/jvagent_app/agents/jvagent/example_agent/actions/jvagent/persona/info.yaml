# Persona Action Package Descriptor

package:
  # Action name in namespace/action_name format
  name: jvagent/persona
  
  # Package author
  author: jvagent
  
  # Archetype: The main Action class name
  archetype: PersonaAction
  
  # Package version
  version: 1.0.0
  
  # Package metadata
  meta:
    title: Persona Action
    description: Core interact action for agent behavioral modeling with LLM-driven parameters
    group: jvagent
    type: interact_action
  
  # Package configuration
  config:
    order:
      weight: 100  # Higher weight = later in pipeline
    singleton: true  # Only one persona action per agent
  
  # Package dependencies
  dependencies:
    jvagent: ~2.1.0

