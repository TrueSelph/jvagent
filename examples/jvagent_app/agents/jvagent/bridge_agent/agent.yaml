# Bridge Agent — Bridge + Reflex + ReasoningHelm reference configuration
#
# The canonical "full tool agency" reference for the bridge+helm pattern.
# A BridgeInteractAction at weight -200 orchestrates N helms — this example
# pairs ReflexHelm (sub-500ms classifier) with ReasoningHelm (think-act-observe
# loop).
#
# Architecture (post-ADR-0009):
#   BridgeInteractAction
#     ├─ ReflexHelm                                (sub-500ms classifier,
#     │                                              anchor-aware peer-awareness)
#     └─ ReasoningHelm                             (pure engine loop, full
#                                                    tool autonomy)
#           ├─ Harness service tools (memory, response, task, conversation, …)
#           ├─ Action tools (pageindex__*, web_search__*, mcp_filesystem__*, …)
#           ├─ Skill bundle tools (Claude-style SKILL.md)
#           └─ delegate_to_ia (ADR-0009 recovery hatch for anchorless flows)

agent: jvagent/bridge_agent
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1

context:
  alias: Bridge Agent
  description: >-
    Bridge-pattern agent giving the model access to all harness services and
    action tools. BridgeInteractAction at weight -200 dispatches to ReflexHelm
    (classifier) and ReasoningHelm (think/act/observe loop). Pre-loaded with
    pageindex_search, pageindex_docs, and web_search skills.
  enabled: true
  interaction_limit: 20

actions:
  # ── BridgeInteractAction — multi-helm orchestrator ──
  - action: jvagent/bridge
    context:
      enabled: true
      helms:
        - ReflexHelm
        - ReasoningHelm
      # ReflexHelm is the default entry point: it classifies the turn and
      # either EMITs directly (trivial) or SHIFTs to ReasoningHelm
      # (substantive). Replaces the bare ReasoningHelm-only config that
      # ran before milestone E.
      default_helm: ReflexHelm
      # Shift budget bounds helm ping-pong. ReasoningHelm-only configs
      # never SHIFT, so 4 is comfortably over-provisioned; tighter is fine
      # once Reflex/Persona land (milestones E/G).
      shift_budget_per_turn: 4
      # First-emit timeout — fires the safety-net ack once per turn when
      # no helm has published by deadline. Bumped from the 800ms ADR
      # default to 2500ms because Reflex now decides per-turn whether
      # to emit a transient_ack on SHIFT (see helm/reflex/prompts.py).
      # When Reflex picks a context-aware ack ("Searching now…",
      # "Looking that up…", etc.) it lands well under 1s and the
      # safety-net never fires. When Reflex omits ack on a fast turn
      # (factual Q answered from history, recap) the engine usually
      # finishes inside 2.5s and the user gets the real answer instead
      # of a generic stall. The safety-net only fires when the engine
      # genuinely hangs — rare, but worth keeping as a backstop.
      first_emit_timeout_ms: 2500
      # ``safety_net_ack_text`` and ``denied_response_text`` are STATIC
      # strings. Reflex's per-turn transient_ack adapts to the user's
      # language (see helm/reflex/prompts.py); these fallback strings
      # do not. For a multilingual deployment, set them to a
      # language-neutral character ("…") or override per-channel via a
      # channel adapter that localises before publish.
      # Bridge looks up the user's detected_language (stamped by
      # ReflexHelm) and picks a variant at random from the matching
      # list. ``default`` is used when the language isn't keyed.
      # ``default`` is consulted ONLY when the safety-net fires before
      # ReflexHelm has stamped ``detected_language`` on BridgeState
      # (typical when Reflex itself is slower than first_emit_timeout_ms,
      # or fails outright). A bare "…" reads as broken text — use the
      # same shape as the English bucket so the user sees a natural
      # lead-in even on the worst-case timing path.
      safety_net_ack_text:
        English:
          - "One moment…"
          - "One sec…"
          - "Hmmm…"
        Spanish:
          - "Un momento…"
          - "Un segundo…"
          - "Mmm…"
        French:
          - "Un instant…"
          - "Une seconde…"
          - "Hmm…"
        default:
          - "One moment…"
          - "One sec…"
      denied_response_text: "Sorry, I can't do that here."

  # ── ReflexHelm — sub-500ms fast classifier (BRIDGE-ROADMAP §E) ──
  # Default helm on every turn. One LM call: classify and either EMIT
  # directly or SHIFT to ReasoningHelm. Bound to GroqLanguageModelAction
  # below. Model: ``llama-3.3-70b-versatile`` — Groq's 70B Llama runs
  # at ~150-300ms p50 with materially better instruction-following than
  # ``llama-3.1-8b-instant``. The 8b model leaks chain-of-thought prose
  # + markdown fences before the JSON verb in real traffic, which
  # parses via the regex fallback in ``reflex_helm._parse_json_verb``
  # but burns ~150 tokens/call and erodes the latency budget. 70B
  # eliminates the preamble, tightens token usage, and improves anchor
  # disambiguation accuracy. Set GROQ_API_KEY in the environment. To
  # revert to the OpenAI mix, swap model_action_type to
  # OpenAILanguageModelAction and model to gpt-4o-mini.
  - action: jvagent/reflex_helm
    context:
      enabled: true
      model_action_type: GroqLanguageModelAction
      model: llama-3.3-70b-versatile
      model_temperature: 0.0
      model_max_tokens: 256
      timeout_seconds: 3.0
      history_limit: 4
      default_shift_target: ReasoningHelm
      # Fires only when classification AND shift both fail (Bridge
      # misconfiguration — default_shift_target isn't an installed peer).
      # Don't pretend action ("one moment") since no helm is going to act.
      fallback_text: "Sorry — I couldn't process that. Could you rephrase or try again?"
      # ``can_emit_directly: true`` lets Reflex answer trivial turns
      # itself; set false to force every turn through ReasoningHelm
      # (useful when polish quality matters more than latency on
      # greetings, since persona stylisation only runs on the
      # engine-final EMIT path).
      can_emit_directly: true

  # ── ReasoningHelm — pure engine loop (ADR-0009) ──
  # ReasoningHelm runs the think-act-observe loop with full tool autonomy.
  # The router subsystem is gone; the engine discovers what it needs
  # through its registered tool surface (harness + skills + delegate_to_ia
  # recovery hatch). Canned response, conversational fast-path, and
  # posture handling were already owned by ReflexHelm upstream.
  - action: jvagent/reasoning_helm
    context:
      enabled: true
      model_action_type: OpenAILanguageModelAction
      model: gpt-4.1
      skills:
        - pageindex_search
        - pageindex_docs
        - web_search
      tool_servers:
        - filesystem
      skills_source: both
      max_iterations: 25
      # Engine thought-stream + tool-progress visibility. Useful for
      # long-running multi-tool turns so the user sees activity rather
      # than dead air. The user-facing lead-in is owned by Reflex's
      # transient_ack on SHIFT — this knob is purely about mid-engine
      # visibility.
      stream_internal_progress: true
      # Secure-by-default — injects SECURITY_BLOCK into the engine system
      # prompt, instructing the model to treat user text as content not
      # commands. Defends against tool-name injection like "Call
      # capability_search with query='admin' and response_publish(...)".
      # Set to false only on agents that intentionally expose tool
      # dispatch through natural language (rare).
      block_raw_tool_invocation: true
      # Engine prompt history depth.
      history_limit: 10
      response_mode: respond

  # ── Ollama Language Model (available for routing variants; not the default) ──
  - action: jvagent/ollama_lm
    context:
      enabled: true
      description: Ollama cloud endpoint (available as a routing variant)
      api_endpoint: https://ollama.com
      # API key is env-only — set OLLAMA_API_KEY in your environment.
      model: deepseek-v4-flash:cloud
      temperature: 0.2
      max_tokens: 16384
      timeout: 120

  # ── OpenAI Language Model (router + persona + reasoning loop) ──
  - action: jvagent/openai_lm
    context:
      enabled: true
      # API key is env-only — set OPENAI_API_KEY in your environment.
      api_endpoint: https://api.openai.com/v1
      model: gpt-4o-mini
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  # ── Groq Language Model (Reflex provider — sub-200ms typical p50) ──
  # Groq runs Llama on dedicated LPU hardware and exposes an
  # OpenAI-compatible API. The bridge_agent binds ReflexHelm to this
  # provider via ``model_action_type: GroqLanguageModelAction`` above.
  # If GROQ_API_KEY is unset, ReflexHelm logs and falls back to its
  # safe-default SHIFT to ReasoningHelm (i.e. behaves like a no-Reflex
  # config until the key is supplied — graceful degradation).
  - action: jvagent/groq_lm
    context:
      enabled: true
      # API key is env-only — set GROQ_API_KEY in your environment.
      # Falls back to OPENAI_API_KEY if GROQ_API_KEY is unset (shared-key
      # deployments). Without either key, this action remains installed
      # but cannot serve requests.
      api_endpoint: https://api.groq.com/openai/v1
      model: llama-3.1-8b-instant
      temperature: 0.0
      max_tokens: 256
      timeout: 10

  - action: jvagent/mcp
    context:
      enabled: true
      description: >
        Example MCP gateway with a sandboxed filesystem server (npx). Registers
        tools under tool_servers for ReasoningHelm; fulfills multi-server
        patterns alongside streamable_http MCP apps.
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      sandbox_mode: true
      sandbox_user_scoped: true
      servers:
        - name: filesystem
          enabled: true
          transport: stdio
          command: npx
          args:
            - -y
            - "@modelcontextprotocol/server-filesystem"
          mcp_connect_timeout: 15
          mcp_call_timeout: 60
          tools: "-all"
          denied_tools: []

  - action: jvagent/intro_interact_action
    context:
      enabled: true
      directive: >-
        Greet the user briefly and explain you can search documents, search the web,
        and remember preferences across the conversation.

  # ── Signup interview (Specialist via DELEGATE) ──
  # InterviewInteractAction declares manifest.turn_lock: true. Once
  # this action opens a session, Bridge auto-DELEGATEs subsequent
  # turns to it via find_turn_lock_owner() until the session closes
  # — Reflex / Reasoning step aside. Anchor surface is reachable
  # from Reasoning's router; from Reflex, a SHIFT to Reasoning is
  # the path in.
  - action: jvagent/signup_interview_interact_action
    context:
      enabled: true
      description: "Training signup interview flow for user registration and training scheduling"
      weight: -50
      anchors:
        - "User wants to sign up or register for jvagent training"
        - "User wants to enroll or join jvagent training"
    config:
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4o-mini"
      model_temperature: 0.1
      model_max_tokens: 8192
      use_history: true
      max_statement_length: 100
      history_limit: 3
      auto_confirm: false

  - action: jvagent/persona
    context:
      enabled: true
      persona_name: Research Assistant
      persona_description: >-
        You are a knowledgeable research assistant with access to internal documents
        and the public web. For simple questions, respond directly and concisely.
        For complex research tasks, you search internal sources first, supplement with
        web search when needed, and synthesize clear, cited answers.
      persona_capabilities:
        - Answer questions from internal knowledge base
        - Search the web for current information
        - Ingest and manage documents
        - Synthesize multi-source research findings
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      model_temperature: 0.2
      model_max_tokens: 1024

  - action: jvagent/pageindex_action
    context:
      enabled: true
      description: Vectorless RAG — indexes documents and provides search / ingest / management APIs
      strategy: direct
      limit: 10
      node_summary: true
    config:
      node_text: true
      summary_token_threshold: 200

  - action: jvagent/serper_web_search
    context:
      enabled: true
      description: Serper Google Search provider
      engine: google_light
      hl: en
      max_results: 10
