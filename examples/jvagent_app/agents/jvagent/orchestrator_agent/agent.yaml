# Orchestrator Agent — Orchestrator-pattern reference configuration (ADR-0012)
#
# The reference agent for the single-orchestrator Orchestrator pattern. An
# OrchestratorInteractAction at weight -200 owns the whole turn: it resumes an
# active flow if one owns the turn (deterministic continuation), otherwise runs
# a think-act-observe loop over the agent's unified tool surface — the reply/respond egress
# reply/respond tools, anchored interact-actions exposed as tools, plain action
# tools (web search), core tools, and native SOP skills. Routing is tool
# selection. Turn-lock: with `lock_active_flow: true` (the default set below) an
# active flow routes deterministically to its IA; set it false to make
# continuation emergent/model-mediated (ADR-0013).
#
# The single pattern orchestrator at the -200 slot.

agent: jvagent/orchestrator_agent
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1

context:
  # Identity (ADR-0014): alias + role form the agent's identity, injected into
  # the Orchestrator's core prompt so the model reasons and writes as the agent.
  alias: Orchestrator Agent
  role: >-
    a helpful assistant that reasons with tools and skills and answers in a
    clear, concise voice
  description: >-
    Orchestrator-pattern agent. One orchestrator (-200) locks onto an active
    flow when present, otherwise reasons and acts over the agent's tool surface,
    replying through the reply/respond egress (ReplyAction).
  enabled: true
  interaction_limit: 20

actions:
  # ── OrchestratorInteractAction — the single orchestrator ──
  - action: jvagent/orchestrator
    context:
      enabled: true

      # -- Model gearing (ADR-0016): a LIGHT completion model handles single-
      # dimensional turns (reply / one tool); the HEAVY model above takes over
      # once the turn is multi-step. Empty light_model = single-model.
      # LIGHT gear handles single-tool turns (e.g. sending a form) — nano-class
      # models announce instead of tool-calling, so mini is the floor here.
      light_model: gpt-4.1-mini
      light_model_action_type: OpenAILanguageModelAction
      light_model_temperature: 0.2
      light_model_max_tokens: 1024
      escalate_after_tool_calls: 2       # heavy after this many substantive tool calls
      escalate_on_skill: true            # activating a skill escalates immediately

      # HEAVY profile — the reasoning model, used once a turn proves multi-step.
      # MODEL FLOOR: the orchestrator is model-mediated — it keeps the loop going
      # only if the model reliably tool-calls each step until the task is done.
      # Weak models (gpt-4o-mini-class) narrate then stop ("I'll write the report
      # now") and end the turn mid-task. Keep this at gpt-4.1 or Claude
      # Opus/Sonnet for any agent that runs multi-step skills/plans. The class
      # default (gpt-4o-mini) is for cheap single-step agents only. See
      # docs/ORCHESTRATOR.md "Model floor".
      model: gpt-4.1
      model_action_type: OpenAILanguageModelAction
      model_temperature: 0.2
      # Agentic/research headroom: each tick is one tool call, so multistep
      # research (search/fetch/write/reply) needs a generous ceiling. The
      # repeat-guard still bounds runaway loops. Thinking models also want more
      # completion tokens (reasoning can count against the budget).
      activation_budget: 40
      model_max_tokens: 8192
      # Prior turns fed into the loop prompt (working context). The rolling
      # memory window is the agent's `interaction_limit` above.
      history_limit: 10
      # Deterministic turn-lock: an active flow's IA owns each turn until it
      # clears its task. Set false for model-mediated (interruptible) continuation.
      lock_active_flow: true

      # Resumable planning (ADR-0019): surface `update_plan` so the model records
      # a multi-step plan on the conversation TaskStore (task_type AGENTIC_LOOP).
      # An unfinished plan is re-surfaced next turn, so an interrupted multi-step
      # turn resumes instead of re-planning. Off by default (zero cost); on here
      # to exercise the feature.
      planning: true

      # Vision (ADR-0021): a pre-loop reflex interprets attached images via the
      # jvagent/vision action (own multimodal model, configured below), stores
      # the description as a conversation artifact, and seeds it into the reply.
      # Off by default; on here to exercise the feature. Requires jvagent/vision.
      vision: true

      # -- Reasoning (only bites with a reasoning-capable model; gpt-4o-mini
      # ignores it). Set effort for o-series / Claude thinking / OpenRouter.
      # reasoning_enabled: true
      # reasoning_effort: medium          # low | medium | high
      # reasoning_budget_tokens: 0        # explicit thinking budget (Anthropic)

      # -- Thinking / progress stream (needs a live response bus). Both surface
      # only while the HEAVY gear is engaged — light ticks finish too fast to
      # bubble, and the light completion model has no reasoning trace to show.
      stream_internal_progress: true     # emit each heavy tick as a 'thought' bubble
      stream_reasoning_trace: true       # surface the heavy model's thinking trace

      # -- Budgets (activation_budget caps ticks; these add wall-clock + length).
      max_duration_seconds: 0             # 0 disables the wall-clock cap
      max_statement_length: 700           # soft reply-length cap (chars); blank = off

      # -- Prompt surface: every sub-prompt defaults to its constant in
      # jvagent/action/orchestrator/prompts.py and is overridable here
      # (system_prompt, user_prompt, tool_use_policy_prompt, flow_in_progress_prompt,
      # length_limit_prompt, finalize_prompt, no_skills_text). They are str.format
      # templates — keep the placeholders and double literal { } as {{ }}. The
      # simplest, safe knob is additive extra instructions:
      system_prompt_extra: >-
        Keep replies brief and conversational; prefer 1-2 sentences unless
        detail is explicitly requested. On WhatsApp text or WhatsApp voice-call
        turns: if the user wants to sign up, sign in, log in, create an account,
        or register, IMMEDIATELY call whatsapp__send_flow with
        flow_name=signin_signup only (no flow_id; do not web-search, do not
        announce first). If they want to book or schedule an appointment,
        IMMEDIATELY call whatsapp__send_flow with
        flow_name=appointment_booking only (no flow_id). Never say you "will
        send" a form — calling the tool IS sending it; only after the tool
        returns ok reply that the form was sent (on a voice call, say it was
        sent to this WhatsApp chat). In all user-facing replies call these
        "forms" (e.g. "sign-up form", "appointment booking form") — never
        "flows". If the latest user message is raw JSON containing form field
        values and a flow_token, that is the user's SUBMITTED form: acknowledge
        completion naturally, reference relevant submitted details (NEVER
        repeat passwords or sensitive values), and do NOT send another form.

      # -- Tooling / egress-UX.
      tool_tier: standard                 # minimal | standard | full
      tool_call_timeout: 0                # per-tool-call timeout (s); 0 disables
      block_raw_tool_invocation: true    # force find_tool/skill for hidden tools

      # -- Lean tool surfacing (ADR-0018). Above the threshold the action+MCP
      # long tail is kept off the prompt (reached via find_tool), with a
      # relevance pre-surface so common turns need no discovery round-trip.
      lean_tool_threshold: 10            # 0 disables (always list every tool)
      lean_presurface_k: 5               # # of relevance-ranked tools shown/turn under lean
      # Always-visible pins: tool-name globs that survive lean, for capabilities
      # that must be callable turn-1 regardless of phrasing. Skill-native
      # equivalent: a SKILL.md with `always-active: true` pins its allowed-tools.
      # Pin the persistence path so it survives lean surfacing: a research →
      # write → assimilate task reaches the save/knowledge-base step many ticks
      # in, where a relevance pre-surface keyed on the original message no longer
      # covers it — without these pins a weak model grabs whatever IS visible
      # (get_artifact, a filesystem MCP) instead of the right tool and stalls.
      # Pin Flow send so signup/appointment intents work turn-1 under lean
      # surfacing (gpt-4.1-nano often skips use_skill / find_tool).
      pinned_tools:
        - "whatsapp__send_flow"
        - "whatsapp__list_flows"
      enable_transient_ack: true         # emit ack(s) only on COMPLEX turns (skill or multiple tools)
      first_emit_timeout_ms: 1200        # delay before the FIRST ack
      ack_interval_ms: 12000             # delay between subsequent acks
      ack_statements:                    # transient 'working on it' line(s), emitted in order
        - "One moment…"
        - "Still working on it…"
      # Arm the ack before the FIRST substantive tool call (not just complex
      # turns): a slow tool (Flow send ≈3s, web search) gets a spoken/visible
      # "One moment…" instead of dead air. Fast tools still surface nothing
      # (the ack only fires if the turn outlives first_emit_timeout_ms).
      ack_on_first_tool_call: true
      max_concurrent_tools: 0             # 0 = unbounded

      # -- Voice-call loop profile: WhatsApp calls run a tighter/faster loop
      # than chat (shorter history prompt, tick + wall-clock caps, per-tool
      # timeout, and a shorter spoken-reply cap). Chat turns are untouched.
      channel_overrides:
        whatsapp_call:
          history_limit: 6              # fewer prior turns in the loop prompt
          activation_budget: 8          # voice turns should be 1-3 ticks
          max_duration_seconds: 30      # hard wall-clock cap for a spoken turn
          tool_call_timeout: 15         # a hung tool can't stall the call
          max_statement_length: 280     # short spoken replies
          system_prompt_extra: >-
            This is a live voice call: answer from what you already know in
            1-2 short spoken sentences. Do not use exploratory tools (web
            search, fetch, knowledge-base search, file tools) unless the user
            explicitly asks you to look something up.

      # -- MCP tool servers: '-all' pulls tools from every enabled jvagent/mcp
      # action; or list action names. Tools surface as mcp_<server>__<tool>.
      tool_servers: "-all"

      # Native SOP skills. Source: app (adjacent skills/) | library
      # (jvagent/skills) | both. `skills` is a finite list of names to load
      # (fnmatch patterns ok); use "-all" for every discovered skill.
      skills_source: both
      skills:
        - web_lookup      # app-local JV skill (agents/.../skills/)
        - research        # library JV skill (jvagent/skills/)
        - answer          # library JV skill — internal-first RAG cascade
        - pdf-generation  # library CLAUDE skill — renders a PDF via code_execution
        - triage          # library CLAUDE skill — sorts findings via code_execution
        - docx            # app-local CLAUDE skill (skills.sh / anthropics) — docx-js + OOXML scripts
        - signup_interview  # app-local interview skill (InterviewAction + SKILL.md interview:)
        - whatsapp_templates  # Meta HSM send via WhatsAppAction (WhatsApp inbound only)
        - whatsapp_flows      # Meta Flow interactive send (WhatsApp text / voice-call)
        - whatsapp_service_flows  # signup/signin + appointment booking Flow intents

  # MCP gateway: a sandboxed filesystem server (npx). Its tools surface to the
  # executive (tool_servers above) as mcp_filesystem__<tool>, sandboxed per
  # agent + per user.
  #
  # DISABLED by default: it writes the SAME per-user slice as ``file_interface``
  # (below) and ``code_execution``, so enabling it gives the model THREE
  # overlapping file surfaces — and in practice a weak model reaches for
  # ``mcp_filesystem__search_files`` (and mis-calls it) instead of the cleaner
  # ``file_interface__*`` tools, stalling a save step. Re-enable only to
  # demo/exercise the MCP path; for file I/O prefer ``file_interface``.
  - action: jvagent/mcp
    context:
      enabled: false
      model_action_type: OpenAILanguageModelAction
      model: gpt-4.1-nano
      sandbox_mode: true
      sandbox_user_scoped: true
      servers:
        - name: filesystem
          enabled: false
          transport: stdio
          command: npx
          args:
            - -y
            - "@modelcontextprotocol/server-filesystem"
          mcp_connect_timeout: 15
          mcp_call_timeout: 60
          tools: "-all"
          denied_tools: []

  - action: jvagent/serper_web_search
    context:
      enabled: true

  # Internal knowledge base (PageIndex): ingest, search, and manage documents.
  # Surfaces pageindex__search / assimilate / list / delete to the executive;
  # pairs with the `answer` skill's internal-first retrieval cascade. Uses the
  # OpenAI LM below for tree-search; litellm + pdf deps auto-install at load.
  - action: jvagent/pageindex_action
    context:
      enabled: true
      model_action_type: OpenAILanguageModelAction
      model: gpt-4.1-nano
      strategy: tree_search
      limit: 10

  # Read full pages after a search surfaces URLs (web_fetch__fetch). SSRF-guarded
  # by default; raises research quality and cuts redundant snippet searches.
  - action: jvagent/web_fetch
    context:
      enabled: true
      max_chars: 8000

  # ── Vision (ADR-0021) — image interpretation with its OWN multimodal model ──
  # When the orchestrator's `vision: true` gate is set (above), a pre-loop reflex
  # runs this over images in data["image_urls"], stores the description as a
  # conversation artifact (source:"vision"), and seeds it into the reply. Also
  # exposes the on-demand interpret_images tool. Point model_action_type/model at
  # a vision-capable provider.
  - action: jvagent/vision
    context:
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o
      # Default instruction for the vision pass. Defaults to an exhaustive
      # description; override here to tune what gets extracted. A per-call
      # prompt (e.g. the interpret_images tool) still takes precedence.
      # interpretation_prompt: >-
      #   Describe this image, focusing on any visible text and tables.

  # ── Code execution substrate (ADR-0017) — the runtime CLAUDE skills assume ──
  # Exposes code_execution__bash, whose cwd is the caller's OWN per-user slice
  # (multitenant: walled off from other users). Activating a `spec: claude` skill
  # (pdf-generation, triage above) stages its folder at .skills/<name>/ here and
  # the model runs its scripts with bash. OFF by default — enabled here to test.
  # The subprocess backend bounds CPU/memory/time/output and scrubs the env, but
  # is NOT a hard jail: run only trusted skills under it. Requires LOCAL file
  # storage (the default ./.files backend).
  - action: jvagent/code_execution
    context:
      enabled: true
      timeout: 90              # wall-clock seconds per command (LaTeX can be slow)
      memory_mb: 0             # 0 = no RLIMIT_AS (some toolchains, e.g. xelatex, mmap large)
      cpu_seconds: 60
      max_output_bytes: 64000
      network: false

  # ── File interface (ADR-0017) — per-user sandboxed file I/O as first-class
  # tools (file_interface__read_file/write_file/list_directory/…). Same per-user
  # slice as code_execution and the filesystem MCP, so a PDF a Claude skill writes
  # under output/ is retrievable here. Useful for agents without code execution.
  - action: jvagent/file_interface
    context:
      enabled: true

  # ── Skill hub — search/install/remove skill bundles for this agent. Management
  # capability (mutates agent.yaml + the skills dir); remove_skill needs explicit
  # confirmation. Enable to test the registry tools.
  - action: jvagent/skill_hub
    context:
      enabled: true

  # Always-execute IA runs BEFORE the executive in the weight chain.
  - action: jvagent/intro_interact_action
    context:
      enabled: true

  # ── Supporting actions ──
  - action: jvagent/openai_lm
    context:
      enabled: true
      api_endpoint: https://api.openai.com/v1
      model: gpt-4.1-nano
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  # ── Ollama Language Model (agentic loop) ──
  - action: jvagent/ollama_lm
    context:
      enabled: true
      description: Ollama cloud endpoint for the cockpit agentic loop
      api_endpoint: https://ollama.com
      # API key is env-only — set OLLAMA_API_KEY in your environment.
      model: kimi-k2.6:cloud
      temperature: 0.2
      max_tokens: 16384
      timeout: 120

  # ReplyAction — the Orchestrator-native egress voice (ADR-0014). Identity
  # comes from the Agent (alias + role above); ReplyAction just voices output.
  - action: jvagent/reply
    context:
      enabled: true
      model_action_type: OpenAILanguageModelAction
      model: gpt-4.1-nano
      model_temperature: 0.3

  # Interview tool bundle — skills-v2 signup flow uses signup_interview skill.
  - action: jvagent/interview
    context:
      enabled: true
      description: Interview action — granular interview__* tools for skill-driven flows

  # ── Proactive task pipeline (TaskMonitor queue + event bridge) ──
  # - action: jvagent/task_trigger_interact_action
  #   context:
  #     enabled: true

  # - action: jvagent/task_creation_interact_action
  #   context:
  #     enabled: true

  # - action: jvagent/task_monitor
  #   context:
  #     enabled: true
  #     tick_interval: "every 2 minutes"
  #     max_parallel_conversations: 5


  - action: jvagent/whatsapp_action
    context:
      enabled: true
      description: "WhatsApp provider (wppconnect, ultramsg, wwebjs, meta)"
      # Bridge: provider wwebjs + WHATSAPP_API_URL / WHATSAPP_API_KEY in .env
      # Cloud API: provider meta + JVCONNECT_URL / JVCONNECT_API_KEY in .env
      #   (phone is bound to the jvconnect API key; waba/phone yaml optional)
      provider: "meta"
      stt_action: "DeepgramSTTAction"
      tts_action: "ElevenLabsTTSAction"
      waba_id: ""              # optional; resolved from jvconnect /account
      phone_number_id: ""      # optional; resolved from jvconnect /account
      access_token: ""         # unused with jvconnect
      # Meta HSMs: only these names may be sent via whatsapp__send_template
      template_allowlist:
        - signup
        - request_contact_info_3
        - account_creation_confirmation_3
      default_template_language: "en_US"
      # Meta Flows: only these names may be sent via whatsapp__send_flow
      # (empty = all WABA flows). Use names only — Meta accepts flow_id OR
      # flow_name, not both.
      flow_allowlist:
        - appointment_booking
        - signin_signup

  - action: jvagent/whatsapp_voice_action
    context:
      enabled: true
      description: "WhatsApp voice calls via jvvoice delegation"
      jvvoice_base_url: "${JVVOICE_BASE_URL}"
      jvvoice_api_key: "${JVVOICE_API_KEY}"
      agent_name: "jvvoice"
      cloud_api_version: "24.0"

  - action: jvagent/elevenlabs_tts
    context:
      enabled: true
      description: "Text-to-Speech action"
      model: "eleven_turbo_v2"
      voice: "Sarah"