# Proposal Skill Interact Action Package Descriptor
# Pipeline-hub for proposal generation: owns specimen path, output directory,
# and LaTeX configuration. Delegates the agentic loop to SkillAction.
package:
  name: jvagent/proposal_skill_interact_action
  author: jvagent
  archetype: ProposalSkillInteractAction
  version: 0.0.1
  meta:
    title: Proposal Skill Interact Action
    description: >
      Proposal-generation pipeline hub that orchestrates draft creation, pricing
      assessment, document authoring, and PDF generation. Extends
      SkillInteractAction with proposal-specific configuration: specimen corpus
      path, output directory, and LaTeX command.
    group: jvagent
    type: action
  config:
    order:
      weight: -60
  dependencies:
    jvagent: ~0.0.1
    actions: []
    pip:
      # HTML→PDF fallback for pdf_generation__pandoc_fallback when LaTeX is not installed.
      # System libraries may still be required (e.g. Pango, GDK-Pixbuf); see WeasyPrint docs.
      - weasyprint>=52.5
    # Not installed by jvagent (no pip package for xelatex). Required for pdf_generation__latex_compile.
    # Tool order: xelatex → pdflatex → lualatex → tectonic. See jvagent/skills/pdf_generation/requirements.txt.
    system:
      - >-
        TeX engine on PATH: TeX Live / MacTeX / MiKTeX (xelatex, pdflatex, or lualatex), or standalone
        tectonic (e.g. brew install tectonic; apt install tectonic where packaged).
