# Proposal Pipeline Action Package Descriptor
# Carrier for proposal-generation pipeline configuration. Owns the specimen
# corpus path, output directory, LaTeX command, branding, and Google Docs
# template ID. Plain Action — the cockpit drives the agentic loop and
# consumes this action's tools and attributes.
package:
  name: jvagent/proposal_pipeline_action
  author: jvagent
  archetype: ProposalPipelineAction
  version: 0.0.1
  meta:
    title: Proposal Pipeline Action
    description: >
      Configuration carrier for the proposal-generation pipeline. Holds
      specimen corpus path, output directory, branding, Google Docs template
      ID, and LaTeX command. Exposes ``proposal_pipeline__get_config`` as a
      cockpit tool. Skill scripts may also read attributes directly via
      ``Action.get_action("ProposalPipelineAction")``.
    group: jvagent
    type: action
  dependencies:
    jvagent: ~0.0.1
    actions: []
    pip:
      # HTML→PDF fallback for pdf_generation__pandoc_fallback when LaTeX is
      # not installed. System libraries may still be required (Pango,
      # GDK-Pixbuf); see WeasyPrint docs.
      - weasyprint>=52.5
    # Not installed by jvagent (no pip package for xelatex). Required for
    # pdf_generation__latex_compile. Tool order: xelatex → pdflatex →
    # lualatex → tectonic.
    system:
      - >-
        TeX engine on PATH: TeX Live / MacTeX / MiKTeX (xelatex, pdflatex, or
        lualatex), or standalone tectonic (e.g. brew install tectonic; apt
        install tectonic where packaged).
