# Cockpit Agent — model-cockpit action with full tool agency
#
# Architecture (multi-provider):
#   Phase 1 — CockpitRouter: router_model_action_type → OpenAI (fast posture + skill selection)
#   Phase 2 — CockpitEngine: model_action_type → Ollama (agentic loop)
#     - The model sees all harness tools (memory_get_history, task_create_plan,
#       response_publish, skill_search, skill_read, etc.)
#     - The model sees all action tools (pageindex__search, web_search__search,
#       gmail__send, google_drive__list, mcp_filesystem__*, etc.)
#     - Skills remain Claude-style SKILL.md bundles with optional .py tool scripts
#
# The cockpit replaces the legacy interact_router; intro, handoff, and persona
# interact actions still run in the chain (cockpit weight is -200 so it routes
# first, then defers to specialised actions when appropriate).
#
# Register one jvagent language-model action per provider; point each phase at
# the right class name. All tuning params use sensible defaults.

agent: jvagent/cockpit_agent
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1

context:
  alias: Cockpit Agent
  description: >-
    A full-cockpit agent giving the model access to all harness services and
    action tools. Routes intent via OpenAI, runs the agentic loop on Ollama.
    Pre-loaded with pageindex_search, pageindex_docs, and web_search skills.
  enabled: true
  interaction_limit: 20

actions:
  - action: jvagent/cockpit
    context:
      enabled: true
      router_model: gpt-4o-mini
      router_model_action_type: OpenAILanguageModelAction
      model_action_type: OpenAILanguageModelAction
      model: gpt-4.1
      skills:
        - pageindex_search
        - pageindex_docs
        - web_search
      tool_servers:
        - filesystem
      skills_source: both
      max_iterations: 25
      stream_internal_progress: true
      block_raw_tool_invocation: false
      # Router context depth. Smaller → faster routing prompt.
      history_limit: 3
      response_mode: respond
      # Latency knobs.
      # ``enable_router_preclassifier``: smalltalk skips the router LLM entirely.
      # ``enable_interact_router_cache``: identical utterances within TTL skip the LLM.
      # ``conversational_fast_path``: empty-route classifications take the
      # persona-only path instead of running the heavy engine.
      enable_router_preclassifier: true
      enable_interact_router_cache: true
      converse_enabled: true
      conversational_fast_path: true
      # Conversational gate context depth. 2 turns is enough for "Hi" /
      # acknowledgment threading without bloating the persona prompt.
      converse_context_limit: 2
      # Directive folded into the persona system prompt on the converse
      # fast-path. Keeps replies short + closers off so the persona
      # doesn't tail-trail with "let me know if…" style invitations.
      converse_persona_prompt: >-
        Brief, in-character replies. Greetings and smalltalk: natural and short.
        Keep replies under 30 words unless the user asks for detail.
        Do not append invitation closers ("let me know if…", "feel free to ask…").

  # ── Ollama Language Model (agentic loop) ──
  - action: jvagent/ollama_lm
    context:
      enabled: true
      description: Ollama cloud endpoint for the cockpit agentic loop
      api_endpoint: https://ollama.com
      # API key is env-only — set OLLAMA_API_KEY in your environment.
      model: deepseek-v4-flash:cloud
      temperature: 0.2
      max_tokens: 16384
      timeout: 120

  # ── OpenAI Language Model (router + persona) ──
  - action: jvagent/openai_lm
    context:
      enabled: true
      # API key is env-only — set OPENAI_API_KEY in your environment.
      api_endpoint: https://api.openai.com/v1
      model: gpt-4o-mini
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  - action: jvagent/mcp
    context:
      enabled: true
      description: >
        Example MCP gateway with a sandboxed filesystem server (npx). Registers
        tools under tool_servers for the cockpit; fulfills multi-server patterns
        alongside streamable_http MCP apps.
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      sandbox_mode: true
      sandbox_user_scoped: true
      servers:
        - name: filesystem
          enabled: true
          transport: stdio
          command: npx
          args:
            - -y
            - "@modelcontextprotocol/server-filesystem"
          mcp_connect_timeout: 15
          mcp_call_timeout: 60
          tools: "-all"
          denied_tools: []

  - action: jvagent/intro_interact_action
    context:
      enabled: true
      directive: >-
        Greet the user briefly and explain you can search documents, search the web,
        and remember preferences across the conversation.

  - action: jvagent/handoff_interact_action
    context:
      enabled: true
      handoff_mode: direct_contact

  - action: jvagent/persona
    context:
      enabled: true
      persona_name: Research Assistant
      persona_description: >-
        You are a knowledgeable research assistant with access to internal documents
        and the public web. For simple questions, respond directly and concisely.
        For complex research tasks, you search internal sources first, supplement with
        web search when needed, and synthesize clear, cited answers.
      persona_capabilities:
        - Answer questions from internal knowledge base
        - Search the web for current information
        - Ingest and manage documents
        - Synthesize multi-source research findings
      model_action_type: OpenAILanguageModelAction
      model: gpt-4o-mini
      model_temperature: 0.2
      # Output cap. 1024 is plenty for greetings, smalltalk, and the
      # synthesis paragraph the engine produces; smaller cap → faster
      # generation + less time-to-last-token. Raise if you need long
      # cited research summaries.
      model_max_tokens: 1024

  - action: jvagent/pageindex_action
    context:
      enabled: true
      description: Vectorless RAG — indexes documents and provides search / ingest / management APIs
      strategy: direct
      limit: 10
      node_summary: true
    config:
      node_text: true
      summary_token_threshold: 200

  - action: jvagent/serper_web_search
    context:
      enabled: true
      description: Serper Google Search provider
      engine: google_light
      hl: en
      max_results: 10
