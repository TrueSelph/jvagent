agent: silvies/silvie_ai
version: 1.0.0
author: V75 Inc.
jvagent: ~0.0.1
context:
  alias: Silvie AI
  description: Silvie is the official sales representative for Silvie's General Store. With knowledge on their wide inventory, she's the go-to AI for stock checks and inventory queries.
  enabled: true
actions:
  # ResponseGatingInteractAction - Determines when to respond, suppress, or defer
  # Runs before InteractRouter (weight -200); classifies utterance posture for realistic conversation
  - action: jvagent/response_gating
    context:
      enabled: true
      description: "Classifies utterance posture (RESPOND/SUPPRESS/DEFER) for realistic conversational behavior"
      model_action_type: "OpenAILanguageModelAction"
      model: gpt-4o-mini
      history_limit: 5
      enable_accumulation: true
      max_fragment_buffer: 5

  - action: jvagent/interact_router
    context:
      enabled: true
      description: "Intent-based routing action that analyzes utterances and routes to appropriate InteractActions"
      # Model Configuration
      model_action_type: "OpenAILanguageModelAction"
      history_limit: 3
      model: "gpt-4.1-mini"
      enable_clarification: true
      enable_canned_response: false

  - action: jvagent/openai_embedding
    context:
      enabled: true
      description: "OpenAI embeddings API for generating vector embeddings"
      # API Configuration
      api_key: ${OPENAI_API_KEY}
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: text-embedding-3-small
      embedding_dimensions: 1536
      timeout: 30

  - action: jvagent/intro_interact_action
    context:
      enabled: true
      description: "Introductory interact action for first-time users"

  # PageIndexRetrievalInteractAction - Vectorless RAG from indexed documents
  # Documents must be ingested first via POST /pageindex/documents
  - action: jvagent/pageindex_retrieval_interact_action
    context:
      enabled: true
      description: "Handles FAQs about products, payments, shipping, returns, accounts, orders, and company information for Silvie's Industrial Solutions."
      weight: -75 # Runs after InteractRouter, before Persona
      anchors:
        - "User asks a FAQ"
        - "User asks about products or categories"
        - "User asks about payment methods or billing"
        - "User asks about shipping or returns"
        - "User asks about their account or orders"
        - "User asks about Silvie's Industrial Solutions company"
      collection: "n.Agent.ea765627fb1f4255b156fb68"
      directive: "Context retrieved from document index:\n\n{results}\n\nUse this context to answer the user's query accurately and concisely. Put the main point in bold."
    config:
      limit: 10
      strategy: "tree_search"
      node_summary: true # Required for tree_search; generates summaries during ingestion
      node_text: true
      doc_description: false
      max_token_num_each_node: 20000
      summary_token_threshold: 600
      # model: gpt-4o-mini  # Optional: override LLM for tree search

  - action: jvagent/openai_lm
    context:
      enabled: true
      description: "OpenAI GPT-4o model action with vision support"
      # API Configuration
      api_key: ${OPENAI_API_KEY}
      api_endpoint: "https://api.openai.com/v1"
      # Model Configuration
      model: "gpt-4.1-mini"
      temperature: 0.2
      max_tokens: 4096
      timeout: 60

  - action: jvagent/persona
    context:
      enabled: true
      description: "Persona action with LLM-driven behavioral parameters"
      # Persona Identity
      persona_name: "Silvie"
      persona_description: |
        You are a confident and professional sales associate at Silvie's Industrial Solutions. You provide accurate information about inventory items and deliver clear, concise customer support. Focus on assisting customers efficiently and ensuring their satisfaction. Keep responses short and direct.
      persona_capabilities:
        - "Check inventory, stock levels, and retrieve product details."
      # Model Configuration
      model_action_type: "OpenAILanguageModelAction"
      model: "gpt-4.1-mini"
      model_temperature: 0.1
      model_max_tokens: 8192

  - action: gdf/qr_code_interact_action
    context:
      enabled: true
      description: "Qr Code Interact action lets ranks request a qr code."
      weight: -40 # Runs after InteractRouter

  - action: jvagent/converse_interact_action
    context:
      enabled: true
      description: "Fallback action for smalltalk and casual conversation"
      weight: 100 # Runs last as a safety net

  - action: silvies/lightspeed_retrieval_interact_action
    context:
      enabled: true
      description: "Retrieves and interacts with Lightspeed products"
      weight: -50 # Runs after InteractRouter
    config:
      model: "gpt-4.1-mini"
      model_temperature: 0.1
      model_max_tokens: 8192

  - action: silvies/lightspeed_api_action
    context:
      enabled: true
      description: "Houses Lightspeed API credentials and endpoints"

  - action: jvagent/agent_utils
    context:
      enabled: true
      description: "Agent Utils action for power user controls"

  - action: jvagent/whatsapp_action
    context:
      enabled: true
      description: "WhatsApp provider (wppconnect, ultramsg, wwebjs)"
      # whatsapp configuration
      provider: wwebjs
      api_url: ${WHATSAPP_API_URL}
      api_key: ${WHATSAPP_API_KEY}
      session: ${WHATSAPP_SESSION}
      base_url: ${APP_BASE_URL}
      token: ${WHATSAPP_TOKEN}

  - action: jvagent/tts_action
    context:
      enabled: true
      description: "Action for Text-to-Speech integration using multiple providers."
      provider: "elevenlabs"
      api_key: ${TTS_API_KEY}
      model: "eleven_turbo_v2"
      voice: "Sarah"

  - action: jvagent/stt_action
    context:
      enabled: true
      description: "Action for Speech-to-Text integration using multiple providers."
      provider: "deepgram"
      api_key: ${STT_API_KEY}
      model: "nova-2"
