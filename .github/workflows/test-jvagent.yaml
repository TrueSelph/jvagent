name: Test jvagent

on:
    pull_request:
    push:
        branches:
            - main
            - dev

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip

            - name: Install jvagent package with test dependencies
              run: python -m pip install -e '.[test]'

            - name: Install jvspatial from dev branch
              run: |
                  python -m pip install --force-reinstall --no-deps \
                    "git+https://github.com/TrueSelph/jvspatial.git@dev"

            - name: Record jvspatial version
              run: |
                  python -c "import importlib.metadata as m; print('jvspatial', m.version('jvspatial'))"

            - name: Validate example app YAML
              run: python -m jvagent.cli validate examples/jvagent_app

            - name: Run tests
              run: pytest tests/ -v --tb=short

            - name: Run pre-commit checks
              run: |
                  pip install pre-commit
                  pre-commit run --all-files
