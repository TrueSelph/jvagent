name: Test jvagent

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Install jvagent package with test dependencies
        run: python -m pip install -e '.[test]'

      - name: Record jvspatial version (integration smoke)
        run: python -c "import importlib.metadata as m; print('jvspatial', m.version('jvspatial'))"

      - name: Validate example app YAML
        run: python -m jvagent.cli validate examples/jvagent_app

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run pre-commit checks
        run: |
          pip install pre-commit
          pre-commit run --all-files

  jvchat:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jvchat/package-lock.json

      - name: Install jvchat dependencies
        working-directory: jvchat
        run: npm ci

      - name: Lint jvchat
        working-directory: jvchat
        run: npm run lint

      - name: Test jvchat
        working-directory: jvchat
        run: npm test

      - name: Build jvchat
        working-directory: jvchat
        run: npm run build
