name: Publish jvagent to PyPI

# Build sdist + wheel and publish via PyPI Trusted Publishing (OIDC — no API
# token secret is stored in this repo).
#
# Trigger: pushing a version tag, or manual workflow_dispatch (retry).
#   - Pre-release tags (e.g. v0.1.0rc1) publish to TestPyPI.
#   - Final tags        (e.g. v0.1.0)    publish to PyPI.
#
# ONE-TIME SETUP (maintainer, on the package indexes):
#   PyPI  (https://pypi.org/manage/account/publishing/):
#     Add a "pending publisher" for project `jvagent`:
#       Owner:        TrueSelph
#       Repository:   jvagent
#       Workflow:     publish-pypi.yaml
#       Environment:  (leave blank — production job does not use a GitHub env)
#   TestPyPI (https://test.pypi.org/manage/account/publishing/): same, but
#       Environment:  testpypi
# See RELEASING.md for the full release runbook.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and publish (e.g. v0.1.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.classify.outputs.prerelease }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            jvchat/package-lock.json
            jvmessenger/package-lock.json

      - name: Build + stage the jvchat UI
        run: python scripts/build_jvchat.py

      - name: Build + stage the jvmessenger embeddable chat
        run: python scripts/build_jvmessenger.py

      - name: Install build tooling
        run: python -m pip install --upgrade build twine packaging

      - name: Verify tag matches version and classify pre-release
        id: classify
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.tag }}"
          else
            REF="${GITHUB_REF_NAME}"
          fi
          TAG="${REF#v}"
          PKG=$(grep -oP '__version__\s*=\s*"\K[^"]+' jvagent/version.py)
          echo "tag=$TAG package=$PKG ref=$REF"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $REF does not match jvagent/version.py ($PKG)"
            exit 1
          fi
          PRE=$(python -c "from packaging.version import Version; print('true' if Version('$PKG').is_prerelease else 'false')")
          echo "prerelease=$PRE" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRE"

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (pre-release tags)
    needs: build
    if: needs.build.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI (final tags)
    needs: build
    if: needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/jvagent
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
