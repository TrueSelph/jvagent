name: Bug report
description: Report a problem with jvagent
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the sections below.
        For security issues, do **not** use this form — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, app YAML, or a code snippet that reproduces the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / traceback
      description: Paste any error output. This is automatically formatted as code.
      render: shell
  - type: input
    id: jvagent-version
    attributes:
      label: jvagent version
      description: Output of `python -c "import jvagent; print(jvagent.__version__)"`
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.11.6
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: e.g. macOS 14.4 (arm64), Ubuntu 22.04
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
